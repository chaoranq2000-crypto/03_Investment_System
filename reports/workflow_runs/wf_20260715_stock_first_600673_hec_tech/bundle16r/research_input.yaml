      judgment: 制冷剂配额约束供给，但配额、销量、实现价格和单位成本必须逐层区分。
      paragraphs:
        - text: 约6万吨配额只作为经营约束，不直接写成销量或利润。
          refs: [metric_600673_refrigerant_quota_2026, claim_600673_quota, assumption_600673_fluoro]
      model_links: [fluorochemicals]
    - section_id: electronics
      title: 电子材料利用率与结构
      judgment: 电子元器件业务的关键是有效产能、利用率和产品结构，年报分部毛利只能作为合并起点。
      paragraphs:
        - text: 未披露产品线级利用率时，模型仅做分部级敏感性，不制造单品经济性。
          refs: [metric_600673_electronic_revenue_2025, electronic_materials, assumption_600673_electronics]
      model_links: [electronic_materials]
    - section_id: q1
      title: 一季度经营更新
      judgment: 2026年一季度收入、利润和经营现金流均有披露，但单季总量无法解释各业务的变化来源。
      paragraphs:
        - text: 半年报需要恢复分部桥，检查化工、电子材料和铝箔的量价成本贡献。
          refs: [metric_600673_q1_revenue_2026, metric_600673_q1_np_2026, metric_600673_q1_ocf_2026, event_600673_interim_segments]
      model_links: [fluorochemicals, electronic_materials]
    - section_id: projects
      title: 液冷与算力项目边界
      judgment: IDC采购上限和算力服务合同总额均是合同条件，不是已确认收入；交付、验收、投运和结算才是模型入口。
      paragraphs:
        - text: 在缺少验收和收入成本披露前，液冷及算力相关分部在预测中保持零收入。
          refs: [metric_600673_idc_cost_ceiling_2026, metric_600673_compute_contract_low_2026, metric_600673_compute_contract_high_2026, claim_600673_idc_cost, claim_600673_compute_contract]
