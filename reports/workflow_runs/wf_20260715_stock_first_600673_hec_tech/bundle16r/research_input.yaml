    - section_id: ma
      title: 并购交割漏斗
      judgment: 交易作价与拟取得股权是草案条款，审批、注册、交割、融资及并表时点尚未完成。
      paragraphs:
        - text: 所有预测情景都不提前并表，只有事件触发后才能增加合并口径。
          refs: [metric_600673_ma_value_2026, claim_600673_ma_pending, event_600673_ma_approval]
      model_links: [acquisition_consolidation, assumption_600673_ma]
    - section_id: scenarios
      title: 分层情景预测
      judgment: 存量业务使用量价成本敏感性，新项目使用零基数事件门，并购使用交割门，三类路径不相互替代。
      paragraphs:
        - text: 这种处理牺牲表面增长数字，却避免把合同金额和交易草案当成经营事实。
          refs: [assumption_600673_fluoro, assumption_600673_electronics, assumption_600673_new_projects, assumption_600673_ma]
      model_links: [fluorochemicals, electronic_materials, liquid_cooling, idc_and_compute_infrastructure, acquisition_consolidation]
    - section_id: risks
      title: 风险与证伪条件
      judgment: 制冷剂价格回落、电子材料利用率下降、项目验收或回款延迟、IDC电力成本上升、并购审批失败与融资成本超预期均可能压低情景结果。
      paragraphs:
        - text: 若后续披露仍无法形成新业务收入成本桥，应继续保留缺失状态而非用合同总额填补。
