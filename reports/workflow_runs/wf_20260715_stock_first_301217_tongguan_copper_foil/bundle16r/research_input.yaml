claims:
  - claim_id: claim_301217_pricing
    claim_type: fact
    text: 铜箔销售定价采用铜价加加工费模式，铜价传导与加工费共同决定收入和单位毛利。
    evidence_ids: [ev_annual_report_301217_20260418_d3f361]
    locator: "page:13"
    counterevidence: 加工费、产品结构和客户议价变化可能使收入与铜价不同步。
  - claim_id: claim_301217_hvlp_output
    claim_type: fact
    text: 2025年HVLP铜箔产量同比增长232%，但年报未披露该产品独立收入和利润。
    evidence_ids: [ev_annual_report_301217_20260418_d3f361]
    locator: "page:19"
    counterevidence: 产量增长不等于认证、售价和利润同步兑现。
  - claim_id: claim_301217_margin_divergence
    claim_type: inference
    text: PCB铜箔对毛利的贡献明显高于锂电池铜箔，结构升级比单纯放量更关键。
    evidence_ids: [ev_annual_report_301217_20260418_d3f361]
    locator: "page:19-20"
    counterevidence: 该判断基于分产品毛利，未拆分单一牌号和客户。
  - claim_id: claim_301217_q1_cash
    claim_type: fact
    text: 2026年一季度经营现金流为负，需与利润增长分开观察。
    evidence_ids: [ev_quarterly_report_301217_20260428_904702]
    locator: "page:2"
    counterevidence: 单季度现金流可能受备货、铜价及结算节奏影响。
