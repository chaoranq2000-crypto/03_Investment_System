    claim_type: inference
    text: 2026年一季度黄金价格同比上升而产量下降，利润改善不能解释为量价齐升。
    evidence_ids: [ev_quarterly_report_600988_20260425_4201ae]
    locator: "page:6"
    counterevidence: 单季度产量受生产和销售时点影响，需用半年和全年数据验证。
  - claim_id: claim_600988_cost_pressure
    claim_type: fact
    text: 一季度单位成本与AISC均高于2025年全年水平。
    evidence_ids: [ev_annual_report_600988_20260321_d53382, ev_quarterly_report_600988_20260425_4201ae]
    locator: "annual page:23; q1 page:6"
    counterevidence: 季节性、矿山结构和阶段性剥离会影响单季度可比性。
  - claim_id: claim_600988_h1_guidance
    claim_type: management_comment
    text: 公司预计2026年上半年归母净利润17.0亿至17.8亿元，数据未经审计，主要原因描述为黄金售价同比上升。
    evidence_ids: [ev_announcement_600988_20260715_c11825]
    locator: "page:1-2"
    counterevidence: 业绩预告是管理层估计，不是审计后事实，也不代表全年利润。
