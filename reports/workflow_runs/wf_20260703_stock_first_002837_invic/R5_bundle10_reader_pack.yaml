sections:
- section_id: executive_summary
  judgment: 现有证据支持英维克具备数据中心温控和端到端液冷产品平台，但尚不足以把公司整体增长解释为液冷收入增长，核心判断应限定为“产品与技术平台暴露已验证、财务贡献仍待分项披露”。
  judgment_refs:
  - E1
  - E4
  blocks:
  - type: paragraph
    text: 2025年公司整体营业收入约60.68亿元、归母净利润约5.22亿元，同比分别约增长32.23%和15.30%；2026年一季度毛利率降至24.29%、净利率降至1.20%，经营现金流净额约为负3.86亿元。
    refs:
    - E1
    - E2
  - type: paragraph
    text: 核心矛盾是产品平台与需求证据在增强，但利润率、现金转化和液冷独立披露尚未同步。这意味着研究判断不能只看收入增长：若后续毛利率与经营现金流不能改善，估值所要求的盈利修复就缺少财务支撑；若宽口径业务增长、分项披露和回款同时改善，当前谨慎判断才有条件上调。
    refs:
    - E2
    - E4
    - E10
    - E14
  - type: paragraph
    text: 后续观察重点依次为半年度报告中的产品与收入口径、毛利率和费用率、应收与存货、经营现金流、实际结果相对三情景模型的偏差，以及同日估值变化。任何一个环节出现反证，都应触发模型重估。
    refs:
    - E10
    - E13
    - E14
    - E18
- section_id: company_context_and_scope
  judgment: 公司的可验证边界是数据中心温控及端到端液冷产品能力，尚不能延伸到液冷独立收入、毛利或公司增长归因；本节仅讨论已披露产品、管理层近似口径与后续证伪条件。
  judgment_refs:
  - E1
  - E3
  blocks:
  - type: paragraph
    text: 2025年年报摘要把业务证据从机房温控延伸到冷板、CDU、快接头和微模块液冷，并披露英特尔测试验证与客户定制案例；与此同时，定期报告仍未给出液冷收入和毛利占比。
    refs:
    - E1
    - E4
  - type: paragraph
    text: 机柜功率密度突破30kW后，冷却方案需要处理芯片级换热、流体分配、连接可靠性、控制和现场服务，客户验证可能提高供应商切换成本；若英维克的多部件平台通过验证并进入批量交付，单项目可覆盖的价值量和服务环节可能增加。
    refs:
    - E1
    - E6
    - E7
    - E16
  - type: paragraph
    text: 管理层表述显示，2024年数据中心机房及算力设备液冷技术相关收入约3亿元，且截至2025年3月液冷链条累计交付约1.2GW。两者分别是近似收入和累计交付口径，不是审计分部收入、在手订单或产能。液冷2025年收入、数值毛利率、客户订单金额和项目回款仍未单列，因此公司整体增长不能被直接归因为液冷。
    refs:
    - E4
    - E5
    - E6
  - type: paragraph
    text: 后续两期定期报告若不再披露液冷核心产品或客户验证，或披露的分项收入显示相关贡献很低且持续下降，应下调产品平台暴露判断。
    refs:
    - E1
    - E4
