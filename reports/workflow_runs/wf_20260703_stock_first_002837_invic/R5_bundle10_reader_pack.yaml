    text: 收入扩张快于利润增长，可能与产品结构、区域组合、价格或费用投入变化有关，但现有披露不足以识别主因；同时应收账款约30.61亿元、存货约11.82亿元和负经营现金流表明资金占用上升，增长兑现需要跨期回款和库存消化配合。
    refs:
    - E1
    - E2
    - E5
  - type: paragraph
    text: 若毛利率和现金转化不能修复，收入增长对净利润、自由现金流和资本回报的贡献会被削弱，并增加营运资金需求；该影响属于公司整体财务质量，不能直接归因于液冷业务。
    refs:
    - E1
    - E2
    - E10
  - type: paragraph
    text: 反证是单季度现金流可能受验收与营运资金节奏扰动，不能仅凭一个季度认定长期恶化；但在连续季度毛利率恢复、经营现金流转正且应收与存货增速低于收入增速之前，现金转换仍是关键约束。后续每季验证毛利率、费用率、应收、存货、合同负债和经营现金流，并记录实际值相对模型的偏差。
    refs:
