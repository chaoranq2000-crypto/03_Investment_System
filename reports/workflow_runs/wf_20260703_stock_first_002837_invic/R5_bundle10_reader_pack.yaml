    text: 多部件平台可能提高单项目覆盖价值，但定制开发、项目交付、区域组合和竞争报价也可能增加成本；当验收周期拉长时，应收账款和库存会先于现金回收上升，使账面收入与现金利润出现时差。
    refs:
    - E3
    - E5
    - E6
  - type: paragraph
    text: 正向情形是产品组合和系统集成提高收入及毛利额，负向情形是项目复杂度、价格竞争和营运资金占用压低毛利率与现金转化；由于分项口径未披露，本阶段不估算液冷收入或毛利。
