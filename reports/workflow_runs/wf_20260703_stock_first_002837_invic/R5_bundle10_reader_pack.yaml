- section_id: industry_structure_and_competition
  judgment: 独立来源同时支持数据中心规模扩张、机柜功率密度上升和PUE约束趋严，液冷需求具备明确技术与政策基础；但政策并列支持多种高效制冷路线，液冷并非唯一受益方案。
  judgment_refs:
  - E7
  - E8
  blocks:
  - type: paragraph
    text: 中国信通院报告称，截至2024年底全国在用数据中心标准机架超过900万，单机柜功率密度已突破30kW；政策要求到2025年底全国平均PUE不高于1.5，新建大型数据中心不高于1.25、国家枢纽项目不高于1.2。
    refs:
    - E16
    - E8
  - type: paragraph
    text: AI服务器提高单机柜热流密度，传统风冷的换热和能效边界收紧，同时PUE硬约束要求数据中心降低非IT能耗，因而可能推动冷板液冷、浸没式液冷以及蒸发冷却、热管和氟泵等路线采用；具体速度仍取决于可靠性、成本和客户标准。
    refs:
    - E7
    - E8
  - type: paragraph
    text: 行业约束扩大高效散热设备、液体分配、换热和系统集成的需求池，但路线选择、改造成本、可靠性和客户标准决定订单落点，不能把行业需求直接映射为英维克收入或市场份额。
    refs:
    - E7
    - E8
    - E1
  - type: paragraph
    text: 英维克披露的端到端液冷部件覆盖和平台验证构成差异化证据，但高澜股份、科创新源、申菱环境和飞荣达也存在液冷或热管理经营线索；由于各公司液冷收入纯度和分部口径均不完整，本阶段只能比较证据层级，不能形成份额或优劣排名。
    refs:
    - E1
    - E7
    - E9
  - type: paragraph
    text: 平台部件广度和客户验证可能缩短集成认证并提高单项目覆盖价值，但专业化同业可通过单品成本、细分客户和不同技术路线竞争；最终竞争结果取决于批量出货、交付可靠性、价格和服务成本，而非产品名称数量。
    refs:
    - E7
    - E9
  - type: paragraph
    text: 反证来自两方面：政策并列支持液冷、蒸发冷却、热管和氟泵等路线，需求增长并不保证单一路线获益；四家同业也有热管理或液冷经营线索，产品结构、客户结构和确认节奏不同。后续应以同期间、同口径的收入、毛利、批量客户与回款验证竞争位置；在分部口径齐备前，不形成市场份额或优劣排名。
    refs:
    - E7
    - E8
    - E9
  - type: paragraph
    text: 若可比公司后续披露可复算的液冷收入、毛利和批量客户数据，显示其规模、盈利或回款持续优于英维克，则“平台覆盖构成相对差异化”的判断应被否定或降级。
    refs:
    - E9
- section_id: forecast_and_scenarios
  judgment: 预测采用2025年审计宽产品线为基期，分别建模收入、毛利、费用、税率、少数股东损益、营运资本和资本开支；三种情景均为估计。
