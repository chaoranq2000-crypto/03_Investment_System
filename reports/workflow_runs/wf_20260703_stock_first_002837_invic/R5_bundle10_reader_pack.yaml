    - E1
    - E2
    - E5
  - type: paragraph
    text: 公司披露液冷系统多个部件与交付能力，说明其进入了相关价值链；但竞争报价、定制开发、项目验收和服务成本可能抵消平台广度。因而观察条件不是产品名称数量，而是机房与机柜温控收入增速、毛利率、项目验收、应收与存货变化，以及是否首次出现可复算的液冷分项。若库存和应收持续快于收入增长而现金流没有改善，平台驱动应被视为未兑现。
