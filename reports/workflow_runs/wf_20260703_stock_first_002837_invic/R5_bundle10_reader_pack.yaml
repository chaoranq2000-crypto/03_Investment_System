  judgment: 现有披露可确认英维克覆盖液冷系统多个部件和交付环节，但无法确认各环节收入、毛利率和价值量；因此分业务经济性应围绕“验证—出货—验收—回款”链条评估，而不能用公司整体毛利率替代液冷分部利润率。
