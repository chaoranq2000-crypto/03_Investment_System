    text: 现金流折现虽然已有短期现金流桥，但缺少审阅后的折现率、终值增速和净负债；分部估值又缺少液冷独立收入、利润和未分配成本。因此两种方法保持停用。后续关注实际利润相对情景的偏差、同业远期口径、净负债桥和液冷分项披露；若任一核心假设失效，应重新计算动态、情景和反向估值。
    refs:
    - E4
    - E10
    - E14
- section_id: dated_events
  judgment: 未来最明确的验证窗口是2026年半年度报告计划披露日；技术状态与公司情绪只提供事件前市场背景，不能替代经营证据。
  judgment_refs:
  - E11
  - E12
  - E13
  blocks:
  - type: paragraph
    text: 技术状态：截至2026-07-10，收盘价73.54元，MA5/MA10/MA20/MA60分别为73.38/74.07/75.53/87.95元；近1个月收益6.7%，近3个月收益-19.6%，近6个月收益-32.7%。价格略高于MA5但低于其余均线，说明短期反弹与中期压力并存。支撑和阻力只作区间统计。
    refs:
    - E11
  - type: paragraph
    text: 宏观情绪缺少可审阅同日指标，保持未定；行业情绪有需求与政策基础，但并非市场风险偏好指标；公司情绪来自两家机构预期差、换手率与不同窗口收益，属于低置信线索。三层情绪不能写成事实，更不能覆盖财务、披露与回款证据。
    refs:
    - E7
    - E8
    - E11
    - E12
  - type: paragraph
    text: 未来事件：计划于2026-08-25披露2026年半年度报告，但日期仍需发行人或交易所确认。影响路径是分业务收入和产品组合先改变增长归因，毛利率与费用率再影响盈利桥，应收、存货和经营现金流决定现金转化。验证指标包括宽口径业务收入、任何同定义液冷收入更新、毛利率、费用率、应收、存货与经营现金流。
    refs:
    - E5
    - E6
    - E13
  - type: paragraph
    text: 上行条件是分业务披露增强且毛利率、利润和回款同步改善；基准条件是宽口径业务按模型增长但液冷仍未单列；反证条件是正式日期变化、利润与现金流低于基准，或收入增长继续伴随毛利率下滑。事件发生后应按实际数据重跑预测、估值和证据缺口。
    refs:
    - E2
    - E10
    - E13
    - E14
- section_id: risks_counterevidence_and_watchpoints
  judgment: 核心反证集中在三点：液冷产品证据尚未转化为可量化分部收入，2026年一季度利润率和经营现金流承压，以及政策与行业资料明确存在多种替代制冷路线；这些因素共同限制论点置信度。
  judgment_refs:
  - E2
  - E7
  - E8
  blocks:
  - type: paragraph
    text: 产品平台和客户验证披露在增加，但液冷收入、毛利和订单转化率仍未披露；同时2026年一季度公司整体经营现金流为负、存货较2025年底上升，行业端冷板主流之外仍存在浸没式、蒸发冷却、热管和氟泵路线。
    refs:
    - E2
    - E4
    - E7
  - type: paragraph
    text: 如果客户验证不能形成批量交付，或替代路线和价格竞争压低项目价值，产品覆盖不会自动转化为利润；若交付与回款周期拉长，存货和应收占用会进一步放大现金流压力。
    refs:
    - E5
    - E6
    - E7
    - E8
  - type: bullets
    items:
    - text: 财务反证：收入增长若继续伴随毛利率、净利率和经营现金流下降，增长质量判断触发降级。
      refs:
      - E1
      - E2
    - text: 业务反证：产品验证若未转化为批量交付、验收与回款，平台覆盖不能支持盈利贡献。
      refs:
      - E4
      - E5
      - E6
    - text: 行业反证：替代制冷路线、价格竞争或客户标准变化可能削弱液冷需求对单一公司的传导。
      refs:
      - E7
      - E8
      - E9
    - text: 估值反证：实际利润若持续低于基准，动态倍数与情景市值需要重新计算。
      refs:
      - E10
      - E11
      - E14
  - type: paragraph
    text: 观察条件是连续两个可比报告期毛利率不再同比下降、经营现金流为正、应收与存货增速低于收入增速，并出现可复算的液冷分项。若这些条件满足且独立行业与客户证据仍支持批量采用，风险约束可下调；若条件未满足，应保留谨慎结论并扩大情景差异。
    refs:
    - E2
    - E4
    - E7
    - E10
- section_id: research_conclusion
  judgment: 现有证据支持公司具备算力热管理与液冷产品平台，但财务兑现仍由宽口径温控业务、利润率和现金流决定；研究状态应保持证据观察。
  judgment_refs:
  - E1
  - E2
  - E4
  - E10
  blocks:
  - type: paragraph
    text: 基准判断依赖三项假设：高密度算力与能效约束继续推动高效散热需求；公司多部件平台能够通过验证进入交付；毛利率、费用纪律和回款随规模扩大而逐步改善。前两项有产品、行业和管理层证据，第三项尚需半年度及后续季度数据验证。
    refs:
    - E4
    - E6
    - E7
    - E8
    - E10
  - type: paragraph
    text: 结论的主要反证是液冷独立经济性长期缺失、2026Q1利润和现金流承压、替代路线与同业竞争，以及当前市值对盈利修复要求较高。若后续实际毛利率、费用率、现金流或分业务收入低于基准，模型与估值应触发降级；若分项披露、利润和回款共同改善，当前谨慎判断才有证据上调。
    refs:
    - E2
    - E4
    - E7
    - E9
    - E14
  - type: paragraph
    text: 跟踪顺序为：第一，核对2026年半年度报告正式日期与分业务口径；第二，比较实际收入、毛利率、费用率、利润和现金流相对三情景的偏差；第三，验证液冷订单、验收与回款；第四，更新同业与分析师口径；第五，在同一日期和分母下重算动态、情景和反向估值。外部人工复核签署前，报告只保持候选状态。
    refs:
    - E5
    - E10
    - E11
    - E12
    - E13
    - E14
