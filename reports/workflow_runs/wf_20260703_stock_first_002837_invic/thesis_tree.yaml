- analysis_id: AN-RISK-001
  section: risk_counterevidence
  claim_type: inference
  judgment: 核心反证集中在三点：液冷产品证据尚未转化为可量化分部收入，2026年一季度利润率和经营现金流承压，以及政策与行业资料明确存在多种替代制冷路线；这些因素共同限制论点置信度。
  trend: 产品平台和客户验证披露在增加，但液冷收入、毛利和订单转化率仍未披露；同时2026年一季度公司整体经营现金流为负、存货较2025年底上升，行业端冷板主流之外仍存在浸没式、蒸发冷却、热管和氟泵路线。
  causal_mechanism: 如果客户验证不能形成批量交付，或替代路线和价格竞争压低项目价值，产品覆盖不会自动转化为利润；若交付与回款周期拉长，存货和应收占用会进一步放大现金流压力。
  financial_impact: 反证兑现时可能表现为收入增速低于预期、毛利率下行、经营现金流持续为负和营运资金增加；相反，端到端产品通过批量交付并改善回款，可缓解这些风险但仍需分项披露确认。
