- analysis_id: AN-CORE-001
  section: core_thesis
  claim_type: inference
  judgment: 现有证据支持英维克具备数据中心温控和端到端液冷产品平台，但尚不足以把公司整体增长解释为液冷收入增长，核心判断应限定为“产品与技术平台暴露已验证、财务贡献仍待分项披露”。
  trend: 2025年年报摘要把业务证据从机房温控延伸到冷板、CDU、快接头和微模块液冷，并披露英特尔测试验证与客户定制案例；与此同时，定期报告仍未给出液冷收入和毛利占比。
  causal_mechanism: 高功率密度服务器提高热流密度和系统复杂度，促使客户从单一制冷设备转向冷板、CDU、连接件、控制和交付服务的组合方案；平台覆盖越完整，进入客户验证和项目配套的机会越多，但只有订单转化、验收和回款完成后才会形成可确认的财务贡献。
  financial_impact: 若产品验证持续转化，影响路径应先体现在数据中心相关收入结构和毛利组合，再传导至经营现金流；若分项披露长期缺失或回款落后，则公司整体收入增长不能作为液冷论点的财务证据。
  supporting_source_ids:
  - SRC-INDUSTRY-CAICT-GREEN-COMPUTING-2025
  - SRC-ISSUER-ANNUAL-SUMMARY-2025
  supporting_metric_ids: []
  counter_evidence_source_ids:
