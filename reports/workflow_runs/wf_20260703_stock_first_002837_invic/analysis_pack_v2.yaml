- analysis_id: AN-BUSINESS-DRIVER-001
  section: business_driver
  claim_type: inference
  judgment: 英维克在液冷链条上的主要可验证驱动不是已披露的收入份额，而是从冷板、CDU、快接头到微模块和交付服务的产品覆盖，以及英特尔测试验证和客户定制开发所体现的准入能力。
  trend: 2025年披露显示产品覆盖从传统机房温控延伸到XSpace微模块液冷、冷板、机架式CDU和快接头，并出现英特尔平台验证与客户定制CDU案例；同期公司整体收入增长，但分项收入仍不能与这些产品逐一对应。
  causal_mechanism: 机柜功率密度突破30kW后，冷却方案需要处理芯片级换热、流体分配、连接可靠性、控制和现场服务，客户验证会提高供应商切换成本；若英维克的多部件平台通过验证并进入批量交付，单项目可覆盖的价值量和服务环节可能增加。
  financial_impact: 驱动兑现应表现为相关产品出货、数据中心业务组合改善和收入增长，并可能伴随研发、库存和应收增加；在分项收入缺失时，只能观察公司整体收入与营运资金变化，不能计算液冷收入贡献。
