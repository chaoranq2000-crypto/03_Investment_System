- analysis_id: AN-FINANCIAL-001
  section: financial_quality
  claim_type: inference
  judgment: 英维克2025年收入与归母净利润均增长，但利润增速低于收入增速，2026年一季度毛利率、净利率和经营现金流进一步承压，当前财务质量应评价为“规模扩张已确认、利润和现金转化需要继续验证”。
  trend: 2025年公司整体营业收入约60.68亿元、归母净利润约5.22亿元，同比分别约增长32.23%和15.30%；2026年一季度毛利率降至24.29%、净利率降至1.20%，经营现金流净额约为负3.86亿元。
  causal_mechanism: 收入扩张快于利润增长意味着产品结构、区域组合、价格或费用投入正在稀释增量收入的利润转化；同时应收账款约30.61亿元、存货约11.82亿元和负经营现金流表明资金占用上升，增长兑现需要跨期回款和库存消化配合。
  financial_impact: 若毛利率和现金转化不能修复，收入增长对净利润、自由现金流和资本回报的贡献会被削弱，并增加营运资金需求；该影响属于公司整体财务质量，不能直接归因于液冷业务。
