- section_id: company_context_and_scope
  title: 公司背景与可验证范围
  judgment: 公司的可验证范围是数据中心温控及端到端液冷产品能力，尚不能延伸到液冷独立收入、毛利、订单金额或公司整体增长归因；管理层近似口径必须与审计分部事实分开。
  judgment_refs:
  - E1
  - E4
  - E5
  - E6
  facts:
  - text: 2025年年报披露的产品范围从机房温控延伸至冷板、冷却液分配装置、快接头和微模块液冷，并包含平台测试验证与客户定制案例；定期报告仍未给出液冷收入和毛利占比。
    refs:
    - E1
    - E4
  - text: 管理层公开交流曾给出2024年数据中心机房及算力设备液冷技术相关收入约3亿元、截至2025年3月液冷链条累计交付约1.2GW的近似口径；两者不是审计分部收入、在手订单或产能。
    refs:
    - E4
    - E5
    - E6
  causal_mechanism:
  - text: 当机柜功率密度超过30kW，冷却方案需要同时处理芯片级换热、流体分配、连接可靠性、控制和现场服务；多部件平台若通过客户验证并进入批量交付，可能提高集成效率和供应商切换成本。
    refs:
    - E1
    - E16
    - E6
    - E7
  economic_implications:
  - text: 平台广度可能扩大单项目覆盖的设备与服务环节，但只有分项出货、验收、毛利和回款被披露后，才可判断其对公司利润和现金流的实际贡献。
    refs:
    - E4
    - E5
    - E6
  counterevidence:
  - text: 产品名称和测试验证并不等于批量收入；政策支持多种高效制冷路线，同业也存在热管理与液冷经营线索，平台覆盖可能受到替代技术、价格竞争和项目执行成本抵消。
    refs:
    - E20
    - E21
    - E22
    - E7
    - E8
    - E9
  uncertainty:
  - text: 管理层口径具有近似性，且尚缺2025年液冷独立收入、数值毛利率、客户订单金额和项目回款，现阶段不能把宽口径机房或机柜温控收入全部归为液冷。
    refs:
    - E1
    - E4
    - E5
  watchpoints:
