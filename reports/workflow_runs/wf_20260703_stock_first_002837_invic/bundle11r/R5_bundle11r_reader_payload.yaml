- section_id: financial_quality
  title: 财务质量与现金转化
  judgment: 英维克2025年收入与归母净利润均增长，但利润增速低于收入增速，2026年一季度毛利率、净利率和经营现金流进一步承压；当前财务质量应评价为规模扩张已确认、利润和现金转化仍需跨期验证。
  judgment_refs:
  - E1
  - E2
  facts:
  - text: 2023A至2025A，公司收入由35.29亿元增至60.68亿元，归母净利润由3.44亿元增至5.22亿元，经营现金流却由4.53亿元降至1.57亿元，增长与现金转换方向分化。
    refs:
    - E1
    - E2
  - text: 2026年一季度收入约11.75亿元、归母净利润约0.09亿元、毛利率约24.29%，经营现金流净额约为负3.86亿元；应收账款和存货占用使短期现金压力更加明显。
    refs:
    - E2
    - E5
  causal_mechanism:
  - text: 收入扩张快于利润增长可能来自产品结构、区域组合、价格或费用投入变化；若项目验收与回款慢于出货，应收和存货会先于现金回收上升，使账面增长与现金利润产生时差。
    refs:
    - E1
    - E2
    - E5
    - E6
  economic_implications:
  - text: 毛利率和现金转化若不能修复，收入增长对归母净利润、自由现金流和资本回报的贡献会被削弱，并提高后续营运资金需求；这一影响属于公司整体财务质量，不能直接归因于液冷业务。
    refs:
    - E1
    - E10
    - E2
  counterevidence:
  - text: 一季度现金流可能包含季节性采购、交付和回款错配，单个季度不足以证明长期恶化；2025年收入与利润仍保持增长，后续应通过连续报告期判断压力是否可逆。
    refs:
    - E1
    - E2
  uncertainty:
  - text: 现有披露不足以把毛利率和现金流变化准确拆分到产品结构、区域、客户、价格和项目阶段，因而不能在缺少分项证据时给出单一原因解释。
    refs:
    - E1
    - E2
    - E5
  watchpoints:
  - metric: 毛利率与经营现金流
    trigger: 连续2个可比报告期毛利率不再同比下降且经营现金流为正
    horizon: 未来两个定期报告
    direction: 支持现金转化进入修复区间
