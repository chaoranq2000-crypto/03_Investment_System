- section_id: forecast_and_scenarios
  title: 预测、情景与现金流桥
  judgment: 当前模型从2025年审计宽口径业务线出发，基准情景仍显示收入增长，但利润和自由现金流修复慢于外部盈利分布；液冷分项经营参数缺失使三情景区间和偏差跟踪比单点预测更重要。
  judgment_refs:
  - E1
  - E2
  - E10
  - E12
  - E19
  facts:
  - text: 基准情景估计2026E、2027E和2028E收入约74.41亿元、88.03亿元和101.31亿元，归母净利润约4.84亿元、6.83亿元和8.87亿元，每股收益约0.38元、0.54元和0.70元；利润桥最大勾稽差额为零。
    refs:
    - E10
    - E19
  - text: 外部盈利分布的每股收益均值约为2026E的0.92元、2027E的1.58元和2028E的2.33元，明显高于内部基准；该分布属于分析师观点，不是发行人指引。
    refs:
    - E12
  - text: 基准模型估计自由现金流由2026E约负1.93亿元改善至2027E约1.39亿元和2028E约4.10亿元，改善依赖毛利率、费用、营运资金和资本开支假设共同兑现。
    refs:
    - E10
    - E17
  - text: 11R经营桥对三种情景、三个期间共9组收入和毛利逐项复算；收入最大差额不足0.0001元，毛利最大差额约0.0101元，均在0.02元容差内。基准2026E代理收入占比约9.32%，预测与估值总量未改变。
    refs:
    - E25
    - E28
  causal_mechanism:
  - text: 模型分别设置机房温控、机柜温控及其他业务的收入增速与毛利率，并显式桥接销售、管理、研发、财务费用、税率、少数股东损益、营运资金和资本开支；利润与现金流对毛利和回款假设高度敏感。
    refs:
    - E10
    - E17
  economic_implications:
  - text: 内部基准低于外部盈利均值，意味着市场预期与审慎模型之间存在较大差距；若实际利润和现金流落在谨慎情景，估值压力会扩大，若分项收入、毛利与回款同步验证，模型才有上修依据。
    refs:
    - E10
    - E12
    - E14
  counterevidence:
  - text: 2025年收入仍快速增长，产品与行业证据也支持需求机会，毛利率和现金流可能在项目验收后修复；因此基准模型不是确定结果，必须保留谨慎和乐观情景。
    refs:
    - E1
    - E10
    - E4
    - E7
  uncertainty:
  - text: 项目量、容量、单价、验收节奏和液冷独立经济性没有发行人同口径披露，模型只能使用宽口径业务线与显式研究假设；外部盈利分布的机构模型和股本口径也未逐家复核。
    refs:
