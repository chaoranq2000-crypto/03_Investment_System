- section_id: market_technical_sentiment_and_events
  title: 市场、技术、情绪与未来验证事件
  judgment: 基准日价格显著波动且处于多条短期均线下方，但没有证据把单日变化归因于特定基本面事件；情绪材料只支持分层线索，未来仅保留一个尚待官方确认的验证窗口。
  judgment_refs:
  - E11
  - E12
  - E13
  - E18
  facts:
  - text: 2026年7月13日收盘价66.98元、单日变动约负8.92%、换手率约5.15%，低于5日均线71.96元、10日均线73.10元和20日均线75.58元；这些指标只描述市场状态。
    refs:
    - E11
    - E18
  - text: 本轮没有足够的同日宏观指标形成独立宏观情绪结论；行业关注度与外部盈利分布属于分析师线索，公司层面的单日价格与成交变化也不能证明经营原因。
    refs:
    - E11
    - E12
    - E7
    - E8
  - text: 当前官方来源没有确认基准日之后的公司事件日期，2026年8月25日只作为待官方确认的验证窗口使用，不写成已确定的业绩或公告日期。
    refs:
    - E13
  causal_mechanism:
  - text: 当外部盈利预期高于内部基准，价格会对利润、现金流和披露节奏的变化更敏感；但价格波动也可能受到市场情绪与交易结构影响，不能从单日走势反推基本面因果。
    refs:
    - E10
    - E11
    - E12
  economic_implications:
  - text: 技术与情绪信息的作用是标记预期压力和刷新时点，而不是证明业务暴露；只有正式披露改变收入、毛利、现金流或模型假设，才应调整研究结论。
    refs:
    - E10
    - E11
    - E2
  counterevidence:
  - text: 单日下跌可能在后续交易日修复，均线位置也会随价格序列快速变化；若没有公司正式披露，技术状态和行业关注线索不足以解释经营变化。
    refs:
