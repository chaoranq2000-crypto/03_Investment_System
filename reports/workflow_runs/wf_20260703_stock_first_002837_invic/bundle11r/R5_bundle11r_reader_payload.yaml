- section_id: risks_and_falsification
  title: 风险、反证与证伪条件
  judgment: 核心反证集中在液冷产品证据尚未转化为可量化分部经济性、2026年一季度利润率与经营现金流承压，以及行业存在替代路线和同业竞争；三类约束共同限制当前论点置信度。
  judgment_refs:
  - E2
  - E4
  - E7
  - E8
  facts:
  - text: 公司已披露液冷多部件与验证线索，但液冷收入、毛利、订单转化率和项目回款仍未单列；当前模型明确不把液冷作为独立可加总分部。
    refs:
    - E1
    - E19
    - E4
  - text: 2026年一季度毛利率和经营现金流承压，行业政策又同时支持液冷、蒸发冷却、热管和氟泵等路线；四家同业仅能作为低置信度上下文。
    refs:
    - E2
    - E20
    - E21
    - E22
    - E8
    - E9
  - text: 11R仍缺少液冷项目或交付容量、单位价值、测试至验收周期、宽口径重叠消除、独立毛利与营运资金口径；语义完整性检查没有发现高等级冲突，但不会替代这些正式证据。
    refs:
    - E24
    - E27
  causal_mechanism:
  - text: 如果客户验证未形成批量交付，或项目验收、价格竞争和服务成本恶化，产品覆盖不会自动转化为利润；营运资金占用会进一步放大现金流压力，而替代路线会削弱需求向单一公司的传导。
    refs:
    - E5
    - E6
    - E7
    - E8
  economic_implications:
  - text: 这些风险会同时影响收入增速、毛利率、现金流与估值分母，因而不能由总分或单一亮点抵消；任一核心章节出现证据越界都应阻断候选状态。
    refs:
    - E10
    - E14
    - E19
    - E2
  counterevidence:
  - text: 公司产品平台、行业高密度算力趋势和2025年整体增长构成正向证据；若连续报告期出现分项披露、利润率改善与现金流转正，可降低部分风险权重。
    refs:
    - E1
    - E4
    - E7
  uncertainty:
  - text: 项目量、单价、验收节奏、客户结构、液冷纯度和同业分部口径仍不完整，风险发生概率无法可靠量化；本节只列出影响路径、证伪条件和刷新要求。
