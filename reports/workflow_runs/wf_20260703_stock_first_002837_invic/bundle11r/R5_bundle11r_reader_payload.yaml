- section_id: valuation_and_market_implied_expectations
  title: 估值与市场隐含预期
  judgment: 2026年7月13日市场快照对应较高的静态与基准动态倍数，当前市值隐含的盈利要求高于内部近期基准；估值只用于解释预期压力和情景差异，不能写成确定价值或行动结论。
  judgment_refs:
  - E10
  - E14
  - E18
  - E19
  facts:
  - text: 截至2026年7月13日，收盘价为66.98元、总市值约853.56亿元；按内部基准归母净利润计算，2026E、2027E和2028E动态市盈率约176.3倍、124.9倍和96.2倍，分母均为研究估计。
    refs:
    - E10
    - E14
    - E18
  - text: 情景估值以2027E归母净利润与显式倍数压力点相乘：谨慎情景约135.8亿至203.7亿元，基准情景约512.4亿至683.2亿元，乐观情景约1023.5亿至1535.3亿元；区间不是已验证的公允价值。
    refs:
    - E10
    - E14
  - text: 反向估值显示，100倍研究压力点对应约8.54亿元归母净利润；基准情景在2028E才达到，乐观情景在2027E达到，谨慎情景到2028E仍未达到。
    refs:
    - E10
    - E14
    - E18
  - text: 四家同业仅提供低置信度经营与市场上下文，官方经营范围可定位，但液冷纯度、分部口径和确认节奏不可直接横比，因此不形成确定性排序。
    refs:
    - E15
    - E20
    - E21
    - E22
    - E9
  - text: 11R对4家候选同业逐项检查经营定义、收入纯度、会计边界、期间与预测日期，合格对象为0家；因此不采用同业倍数，继续只用原9R反向估值和情景压力测试解释市场隐含要求。
    refs:
    - E26
    - E28
  causal_mechanism:
  - text: 当前市值除以不同情景的归母净利润得到动态倍数，毛利率、费用率、营运资金和收入假设会通过利润分母放大估值变化；倍数本身不能反向证明业务竞争力。
    refs:
    - E10
    - E14
    - E18
  economic_implications:
  - text: 市场资本化水平要求利润修复持续兑现，实际结果若低于基准，隐含倍数和预期压力会进一步上升；若利润和现金流改善，压力可下降，但仍需结合方法限制解释。
    refs:
    - E10
    - E14
    - E18
  counterevidence:
  - text: 乐观情景在更高利润假设下可覆盖当前市值，基准情景也在2028E触及100倍利润压力点；这说明当前估值并非由单一结论决定，但所有覆盖都依赖尚未实现的估计。
    refs:
    - E10
    - E14
  uncertainty:
  - text: 净债务、企业价值、折现率、终值增速及液冷分部经济性仍不足，现金流折现和分部加总方法保持停用；同业缺乏可比的远期倍数与液冷纯度，比较只能低置信度使用。
    refs:
    - E14
    - E20
    - E21
    - E22
    - E9
  watchpoints:
  - metric: 利润压力点
    trigger: 滚动归母净利润相对8.54亿元压力点偏差超过10%
    horizon: 每次定期报告后
