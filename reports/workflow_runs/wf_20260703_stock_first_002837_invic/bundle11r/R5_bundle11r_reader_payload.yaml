- section_id: industry_and_competition
  title: 行业结构与竞争边界
  judgment: 独立来源支持数据中心规模扩张、机柜功率密度上升和能效约束趋严，液冷需求具有技术与政策基础；但政策并列支持多种高效制冷路线，同业经营口径又不可直接横比，行业景气不能自动映射为英维克收入或份额。
  judgment_refs:
  - E7
  - E8
  - E16
  facts:
  - text: 中国信通院研究资料显示，截至2024年底全国在用数据中心标准机架超过900万，单机柜功率密度已突破30kW；该信息属于独立行业研究口径，不是单一公司的经营事实。
    refs:
    - E16
    - E7
  - text: 政策要求到2025年底全国平均电能利用效率不高于1.5，新建大型数据中心不高于1.25、国家枢纽项目不高于1.2，同时列举液冷、蒸发冷却、热管和氟泵等多种高效路线。
    refs:
    - E8
  - text: 高澜股份、科创新源、申菱环境和飞荣达均有热管理或液冷经营线索，但液冷收入纯度、产品组合、客户结构和确认节奏不同；当前仅作低置信度经营上下文，不进行确定性排序。
    refs:
    - E20
    - E21
    - E22
    - E9
  causal_mechanism:
  - text: 高密度算力提高单位机柜热流密度，传统风冷的换热与能效边界收紧；能效约束进一步降低非信息技术能耗容忍度，从而推动冷板、浸没式及其他高效散热方案评估，但落地速度仍由可靠性、成本和客户标准决定。
    refs:
    - E16
    - E7
    - E8
  economic_implications:
  - text: 行业约束扩大高效散热设备、流体分配、换热与系统集成的潜在需求池；对英维克而言，只有批量出货、交付可靠性、价格和服务成本共同验证，需求池才可能转化为可持续利润。
    refs:
    - E1
    - E7
    - E8
  counterevidence:
  - text: 政策支持多种路线，专业化同业也可能依靠单品成本、细分客户或不同技术路线竞争；因此液冷需求增长不保证单一路线或单一公司持续受益。
    refs:
    - E20
    - E21
    - E22
    - E8
    - E9
  uncertainty:
