- section_id: segment_economics
  title: 业务拆分与细分经济性
  judgment: 现有披露可确认英维克覆盖液冷系统多个部件和交付环节，但无法确认各环节收入、毛利率和价值量；分业务经济性应围绕验证、出货、验收和回款链条评估，不能用公司整体毛利率替代液冷分部利润率。
  judgment_refs:
  - E1
  - E3
  - E4
  facts:
  - text: 2025年机房温控节能产品收入约34.48亿元、占比约56.83%、毛利率约28.36%；机柜温控节能产品收入约19.77亿元、占比约32.59%、毛利率约27.24%，宽产品线可与公司收入总额勾稽。
    refs:
    - E1
    - E3
  - text: 公司披露冷板、冷却液分配装置、快接头和微模块液冷等产品与验证案例，但液冷独立收入、毛利率和项目回款未单列，当前模型将相关经济性保留为未量化且不重复加总。
    refs:
    - E1
    - E19
    - E4
  - text: 2025年公司级精密温控节能设备销量为324,058台。11R以公司总收入除以该销量形成混合单价，再把两条宽产品线收入换算为等价销量；这是低置信度研究估计，不是发行人披露的分部出货量、项目数或液冷销量。
    refs:
    - E23
    - E24
    - E25
  causal_mechanism:
  - text: 多部件平台可能提高单项目覆盖价值，但定制开发、项目交付、验收周期、区域组合和竞争报价也会增加成本；验收拉长时，应收和存货会先于现金回收上升。
    refs:
    - E3
    - E5
    - E6
  economic_implications:
  - text: 正向情形是系统集成提高收入与毛利额并缩短客户集成周期，负向情形是项目复杂度、价格竞争和营运资金占用压低利润与现金转化；现阶段不对液冷单独估算收入或毛利。
    refs:
    - E1
    - E2
    - E4
    - E5
  counterevidence:
  - text: 平台覆盖可能被专业化同业的单品成本、不同技术路线和客户关系抵消；如果产品验证未形成批量交付、验收与回款，部件数量增加不能证明盈利贡献。
    refs:
    - E20
    - E21
    - E22
    - E5
    - E6
    - E9
  uncertainty:
  - text: 宽口径机房与机柜温控包含哪些液冷产品、各产品单价和项目容量、收入确认节奏及独立毛利均未披露，因此液冷经济性保持未量化、非加总状态。
    refs:
    - E1
    - E19
    - E4
