sections:
- section_id: executive_summary
  title: 核心矛盾与研究边界
  judgment: 现有证据支持英维克具备数据中心温控和端到端液冷产品平台，但尚不足以把公司整体增长解释为液冷收入增长；当前核心判断应限定为产品与技术平台暴露已验证、利润和现金贡献仍待分项披露与跨期验证。
  judgment_refs:
  - E1
  - E2
  - E4
  - E19
  facts:
  - text: 2025年公司营业收入约60.68亿元、归母净利润约5.22亿元，同比分别增长约32.23%和15.30%；2026年一季度毛利率约24.29%、净利率约1.20%，经营现金流净额约为负3.86亿元，规模扩张与利润、现金转化出现分化。
    refs:
    - E1
    - E2
  - text: 当前模型代际以2025年审计宽口径业务线为锚，基准情景估计2026E至2028E归母净利润约4.84亿元、6.83亿元和8.87亿元；这些数值属于研究估计，不是发行人指引，也不单列液冷分部。
    refs:
    - E10
    - E19
  - text: 11R将机房与机柜温控拆成等价量价桥，其他业务保留显式代理；三种情景的代理收入占比最高约9.52%，并在分币级容差内与原9R宽口径收入和毛利勾稽，不额外增加液冷收入。
    refs:
    - E24
    - E25
    - E28
  causal_mechanism:
  - text: 产品覆盖和行业需求只能先形成项目机会，随后还需经历客户验证、批量交付、验收确认与回款；若毛利率、费用纪律和营运资金没有同步改善，收入增长不会等比例转化为净利润和自由现金流。
    refs:
    - E10
    - E2
    - E4
    - E5
  economic_implications:
  - text: 研究价值不在于单一增长率，而在于判断产品平台能否转化为可复算的分业务利润和现金回报；当前市场资本化水平对盈利修复要求较高，模型偏差会直接改变估值压力测试结果。
    refs:
    - E10
    - E14
    - E18
  counterevidence:
  - text: 单季度现金流可能受验收与营运资金节奏扰动，不能据此认定长期恶化；同时公司已披露多部件液冷平台和客户验证线索，若后续批量交付与回款被正式披露，当前谨慎判断可以得到正向修订。
    refs:
    - E1
    - E4
    - E5
    - E6
  uncertainty:
  - text: 液冷独立收入、毛利率、项目价值量和回款周期尚无同口径发行人披露，外部盈利分布与三情景模型也均为估计，因此本稿只给出可证伪的研究框架，不给出确定性增长归因。
    refs:
    - E10
    - E12
    - E4
  watchpoints:
  - metric: 利润与现金转化
    trigger: 连续2个可比报告期毛利率不再同比下降且经营现金流转正
