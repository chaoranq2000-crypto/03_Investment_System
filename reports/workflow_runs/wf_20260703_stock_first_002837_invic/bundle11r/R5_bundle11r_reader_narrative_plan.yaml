narrative_chapters:
- chapter_id: core_question
  title: 问题不在有没有液冷，而在能否兑现
  lead:
    text: 英维克的液冷产品能力已经可以被证据确认，但它能否转化为利润和现金，仍是这份研究最需要回答、也尚未被回答完的问题。
    refs:
    - E1
    - E2
    - E4
    - E19
  paragraphs:
  - text: 先看已经发生的经营结果。2025年，公司营业收入约60.68亿元、归母净利润约5.22亿元，同比分别增长32.23%和15.30%；收入跑得比利润快。到2026年一季度，收入约11.75亿元，归母净利润只剩约0.09亿元，毛利率降至24.29%，经营现金流净流出约3.86亿元。单季数据不能被直接外推为全年趋势，却足以说明一个矛盾：规模仍在扩张，利润率和现金转化没有同步跟上。
    refs:
    - E1
    - E2
  - text: 再看公司究竟具备什么。年报和正式材料支持其产品范围从机房温控延伸到冷板、冷却液分配装置、快接头和微模块液冷，也有平台测试和客户定制线索；这让“公司具备端到端液冷平台”成为有依据的事实。问题在于，定期报告尚未单列液冷收入、毛利率、订单金额和项目回款，因此不能把公司的全部增长都归因于液冷，更不能用公司整体毛利率替代液冷业务的经济性。
    refs:
    - E1
    - E4
    - E5
    - E6
  - text: 所以，当前最稳妥的结论不是简单看多或看空，而是把公司放在一条可验证的兑现链上：行业需求带来项目机会，产品通过客户验证后进入批量交付，验收和回款再决定利润与现金。前三步中的任何一步停滞，都可能让技术平台停留在“有产品、有项目线索”，而没有变成可复算的财务贡献。后续判断应围绕这条链条更新，而不是围绕热度更新。
    refs:
    - E2
    - E4
    - E5
    - E6
    - E10
  - text: 新一轮拆解没有改变这个核心矛盾。三种情景的宽产品线收入和毛利都能与原模型勾稽，六个研究维度也没有发现高等级语义冲突；但项目数、单位价值、验收周期和独立液冷利润仍然缺失，所以经营桥提高的是可解释性，而不是液冷结论的置信度。
    refs:
    - E24
    - E25
    - E27
    - E28
- chapter_id: business_model
  title: 公司靠什么赚钱：宽温控基本盘与液冷平台
  lead:
    text: 公司的财务基本盘仍是宽口径温控业务；液冷更像嵌入其中、等待被单独量化的平台能力，而不是已经披露清楚的新分部。
    refs:
    - E1
    - E3
    - E4
  paragraphs:
  - text: 2025年，机房温控节能产品收入约34.48亿元，占公司收入56.83%，毛利率28.36%；机柜温控节能产品收入约19.77亿元，占比32.59%，毛利率27.24%。这两条宽产品线合计构成绝大部分收入，也是目前能够和审计报表完整勾稽的经营口径。液冷产品可能分布在其中，但披露没有告诉我们各自包含多少液冷收入，所以不能把宽口径收入直接改名为液冷收入。
    refs:
    - E1
    - E3
    - E4
  - text: 年报还披露公司级精密温控节能设备销量324,058台。以公司总收入除以该销量，可以得到一个公司级混合单价，再将机房与机柜温控收入换算成等价销量，从而把宽口径预测写成量价关系。这个换算不是发行人披露的分部出货，更不是液冷项目数；它只能作为有边界的低置信度估计。
    refs:
    - E23
    - E24
    - E25
  - text: 管理层公开交流曾提到，2024年数据中心机房及算力设备液冷技术相关收入约3亿元，截至2025年3月液冷链条累计交付约1.2GW。这些数字能帮助理解业务进展，却属于管理层近似口径：它们不是审计分部收入，也不是在手订单、产能或已经回款的项目金额。把近似口径与审计事实分开，是避免高估业务成熟度的关键。
    refs:
    - E4
    - E5
    - E6
  - text: 平台化的潜在价值并不难理解。高功率机柜需要同时处理芯片级换热、流体分配、连接可靠性、控制和现场服务，能够覆盖多个环节的供应商，可能降低客户集成成本，并增加单个项目可触达的设备与服务范围。但复杂度也会反过来带来定制开发、交付协调、验收周期和服务成本；若验收慢于出货，应收和存货先上升，现金回收便会落后于收入确认。
    refs:
    - E1
    - E3
    - E5
    - E6
    - E7
    - E16
  - text: 因而，对这块业务最有信息量的下一份披露，不是再增加几个产品名称，而是第一次给出能够与公司总额勾稽的液冷收入、毛利或项目价值量。只有出现这类数据，才能判断平台广度究竟提高了利润，还是只提高了项目复杂度和营运资金占用。
    refs:
    - E1
    - E2
    - E4
    - E19
  table_sources:
  - segment_economics
- chapter_id: demand_conversion
  title: 需求成立，但不会自动变成公司利润
  lead:
    text: 高密度算力和能效约束给液冷提供了真实需求基础；它们证明的是市场为什么需要更高效的散热，而不是某家公司必然获得收入和份额。
    refs:
    - E7
    - E8
    - E16
  paragraphs:
  - text: 独立行业资料显示，截至2024年底，全国在用数据中心标准机架超过900万，单机柜功率密度已突破30kW。功率密度上升意味着单位空间内需要搬走更多热量，传统风冷的换热和能效边界随之收紧，客户会更认真地评估冷板、浸没式以及其他高效散热方案。这是液冷需求最扎实的物理基础。
    refs:
    - E7
    - E16
  - text: 政策约束进一步强化了这一方向。相关要求提出，到2025年底全国数据中心平均电能利用效率不高于1.5，新建大型数据中心不高于1.25，国家枢纽节点项目不高于1.2。不过，政策同时列举液冷、蒸发冷却、热管和氟泵等多种高效路线，并没有替市场选出唯一赢家。需求池扩大与单一路线胜出之间，仍隔着可靠性、成本、客户标准和交付能力。
    refs:
    - E8
  - text: 竞争也不能被省略。高澜股份、科创新源、申菱环境和飞荣达均有热管理或液冷经营线索，但各家的液冷纯度、产品组合、客户结构和收入确认节奏并不一致；当前材料只够提供低置信度的经营上下文，不足以做确定性排序，更不能据此推算市场份额。专业化同业可能凭单品成本或细分客户关系取胜，替代技术也可能压缩某些产品的价值量。
    refs:
    - E9
    - E15
    - E20
    - E21
    - E22
  - text: 对英维克而言，行业需求要穿过四道门才会进入财务报表：客户验证、批量交付、项目验收和现金回收。产品平台有助于争取前两道门，但毛利率、服务成本和营运资金决定后两道门。正因为如此，行业景气只能作为机会的背景，不能替代公司自身的兑现证据。
    refs:
    - E1
    - E5
    - E6
    - E7
    - E8
- chapter_id: financial_delivery
  title: 增长的成色：收入在扩，利润与现金没有同步
  lead:
    text: 历史数据给出的信号并不悲观，但明显不够轻松：公司增长是真的，增长质量承受的压力也是真的。
    refs:
    - E1
    - E2
  paragraphs:
  - text: 从2023年到2025年，公司收入由35.29亿元增至60.68亿元，归母净利润由3.44亿元增至5.22亿元，经营现金流却由4.53亿元降至1.57亿元。2026年一季度，毛利率、净利润和经营现金流进一步承压。这里不能草率归因于某一个产品或客户，因为现有披露无法把变化准确拆到产品结构、区域、价格、费用投入和项目阶段；但方向上的分化已经足够清楚：账面增长对现金的转化在减弱。
    refs:
    - E1
    - E2
    - E5
  - text: 一季度可能包含季节性采购、交付和回款错配，单个季度不足以证明长期恶化。真正需要警惕的是这种分化连续出现：如果收入增长持续伴随毛利率下降，应收和存货又跑得比收入更快，经营现金流便可能长期依赖后续回款修复。反过来，若未来两个可比报告期的毛利率不再同比下降、经营现金流转正，且应收和存货增速回落，财务质量判断就有上调依据。
    refs:
    - E1
    - E2
    - E5
  table_sources:
  - financial_quality
  paragraphs_after_tables:
  - text: 11R按三种情景和三个期间复算了9组宽产品线结果。收入最大差额不足一分钱的万分之一，毛利最大差额约一分钱，均落在两分钱容差内；基准2026E其他业务代理占收入约9.32%。因此这次拆解没有通过新增液冷收入抬高预测，原反向估值和情景压力测试也无需改写。
    refs:
    - E25
    - E28
  - text: 基准情景把2026E至2028E收入分别估计为74.41亿元、88.03亿元和101.31亿元，归母净利润分别为4.84亿元、6.83亿元和8.87亿元，对应每股收益0.38元、0.54元和0.70元。自由现金流则从2026E的约负1.93亿元，改善至2027E的1.39亿元和2028E的4.10亿元。这里的每一个数字都是研究估计，不是公司指引，也没有把液冷虚构成独立分部。
    refs:
    - E10
    - E17
    - E19
  - text: 这条修复路径需要多项条件同时成立：机房和机柜温控保持增长，综合毛利率由25.9%逐步回升到27.2%，费用受到控制，营运资金和资本开支不再吞噬过多现金。模型本身可以勾稽，并不意味着假设一定兑现；实际收入或毛利率相对基准偏差超过5%，或经营现金流相对年度锚偏差超过20%，都应触发重算。
    refs:
    - E10
    - E17
  - text: 外部分析师给出的每股收益均值明显更高，2026E至2028E分别约0.92元、1.58元和2.33元。它们是分析师观点，不是发行人事实。内部基准与外部预期之间的距离，揭示了市场对利润弹性的期待，也提示了最大的预期差风险：若实际结果靠近内部基准而不是外部均值，估值压力会更突出；若分项收入、毛利和回款同时改善，内部假设才有上修理由。
    refs:
    - E10
    - E12
    - E14
  table_sources_after:
  - forecast_and_scenarios
- chapter_id: market_expectations
  title: 市场已经计入多少增长
  lead:
    text: 当前价格并不只是在为已有利润付费，它更像是在要求未来几年持续兑现显著的盈利修复。
    refs:
    - E10
    - E14
    - E18
  paragraphs:
  - text: 截至2026年7月13日，英维克收盘价66.98元，总市值约853.56亿元。以内部基准的归母净利润为分母，2026E、2027E和2028E动态市盈率约为176.3倍、124.9倍和96.2倍。高倍数本身不能证明公司被高估或低估，但它清楚地说明：只要利润兑现慢于预期，估值分母的变化就会被显著放大。
    refs:
    - E10
    - E14
    - E18
  - text: 同业比较也需要先过方法资格。高澜股份、科创新源、申菱环境和飞荣达在液冷收入纯度、会计边界、报告期间与预测日期上都没有形成同口径，当前合格对象为零。因此同业只能解释行业背景，不能提供估值倍数锚；这里仍以公司自身的利润压力点和三情景结果为主。
    refs:
    - E26
    - E28
  - text: 情景估值进一步展示了这种敏感性。以2027E利润和显式倍数压力点计算，谨慎情景对应约135.8亿至203.7亿元，基准情景约512.4亿至683.2亿元，乐观情景约1023.5亿至1535.3亿元。区间跨度如此之大，不是因为计算复杂，而是因为毛利率、费用率和收入假设稍有变化，利润分母就会走向完全不同的路径；这些区间只能用于压力测试，不能被写成已经验证的公允价值。
    refs:
    - E10
    - E14
  - text: 反向看，100倍研究压力点对应约8.54亿元归母净利润。内部基准要到2028E才接近这一水平，乐观情景在2027E达到，谨慎情景到2028E仍未达到。换句话说，当前市值需要公司在未来几年把利润修复从“可能”变成“连续可见”。净债务、折现率、终值增速和液冷分部经济性仍不完整，因此现金流折现和分部加总方法暂不启用。
    refs:
    - E4
    - E10
    - E14
    - E18
    - E19
  - text: 短期市场状态只宜作为背景。7月13日股价单日下跌约8.92%，低于5日、10日和20日均线，但没有证据把这一天的波动归因于某个基本面事件；价格也可能受到市场情绪与交易结构影响。技术位置可以提醒我们外部预期正在变化，却不能反向证明业务好坏。
    refs:
    - E11
    - E12
    - E18
  tables:
  - title: 2027E情景估值压力测试
    headers:
    - 情景
    - 估值区间（亿元）
    - 解释边界
    rows:
    - - 谨慎
      - 135.8—203.7
      - 利润与倍数假设均偏谨慎
    - - 基准
      - 512.4—683.2
      - 基于内部基准利润
    - - 乐观
      - 1023.5—1535.3
      - 依赖更高盈利兑现
    note: 区间均为研究压力测试，不是行动结论或已验证公允价值。
    refs:
    - E10
    - E14
- chapter_id: falsification
  title: 什么会证明这套判断错了
  lead:
    text: 一份研究真正有用的地方，不只是解释为什么可能成立，还要事先写清楚什么证据会让它失效。
    refs:
    - E2
    - E4
    - E7
    - E8
  paragraphs:
  - text: 第一类反证来自业务兑现。如果未来连续两个报告期仍看不到批量交付、验收、回款或可复算的液冷分项数据，那么“平台能力”就不能升级为高置信度的收入和利润贡献。反过来，首次出现能够与公司总额勾稽的液冷收入和毛利，并且后续能够连续复核，会明显增强论点。
    refs:
    - E1
    - E4
    - E5
    - E6
  - text: 第二类反证来自财务质量。若收入继续增长，但毛利率连续下降、应收和存货增速持续高于收入、经营现金流仍为负，说明增长可能以更高的资金占用换来，基准情景中的利润和现金修复就需要下调。若毛利率企稳、现金转正且营运资金压力缓解，则会削弱这一风险。
    refs:
    - E1
    - E2
    - E5
    - E10
    - E17
  - text: 第三类反证来自行业与竞争。政策并不只支持液冷一种路线，同业也可能凭成本、客户或技术路线取得优势。如果后续可比口径显示替代方案更具经济性，或者多家同业在分项收入和毛利上持续领先，行业需求就不能再被简单映射到英维克。由于现有同业口径尚未对齐，这一判断目前只能保持低置信度。
    refs:
    - E8
    - E9
    - E20
    - E21
    - E22
  - text: 2026年8月25日目前只是一处待官方确认的验证窗口，不是已经确定的公告日期。只有官方来源确认后，才应把它升级为正式事件，并在披露出现时依次核对宽口径收入、液冷分项、毛利率、应收、存货和经营现金流。若日期没有被确认，或者正式披露仍缺少可复算分项，就不应让一个日历节点改变研究结论。
    refs:
    - E2
    - E5
    - E10
    - E13
    - E14
  - text: 归根结底，这项研究的正向路径是产品平台经过交付和回款，最终反映为利润率与现金改善；负向路径则是产品线越来越丰富，但分项经济性长期缺席，利润与现金又持续弱于基准。哪条路径更接近现实，应由下一轮正式披露决定，而不是由既有叙事的惯性决定。
    refs:
    - E1
    - E2
    - E4
    - E10
    - E19
  - text: 经营桥的替换条件也已经明确：发行人一旦给出可复算的分部出货或项目量、单位价值、验收节奏、独立毛利和回款口径，就应替换当前等价销量与其他业务代理并重算；若至少三家同业形成同期间同经营定义的官方口径，才重新评估同业方法。
    refs:
    - E24
    - E25
    - E26
    - E28
  watchpoints:
  - metric: 毛利率与经营现金流
    trigger: 连续2个可比报告期毛利率不再同比下降且经营现金流转正
    horizon: 未来两个定期报告
    direction: 同时满足才支持上调财务兑现判断
    refs:
    - E1
