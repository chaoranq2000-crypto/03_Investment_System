  text: 基准情景2026E营业收入为74.41亿元。机房与机柜温控由等价销量和混合单价驱动，其他业务代理收入占比为9.32%，低于45%硬上限；驱动结果与Bundle
    9R宽口径分部收入和毛利逐项勾稽，因此没有通过额外加总液冷收入来抬高公司预测。
