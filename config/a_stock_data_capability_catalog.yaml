  reviewed_commit: 9ed665c
  reviewed_date: '2026-07-13'
  declared_architecture_layers: 10
  declared_primary_endpoint_groups: 40
  declared_official_fallback_groups: 3
  license: Apache-2.0
  implementation_copy_policy: No upstream endpoint implementation is copied by this control-plane patch.
    Capability names and operating methods are normalized with attribution.
normalization_note: Compound route-table rows are split only where needed to preserve 40 primary capability
  groups; upstream function names are retained in upstream_functions.
decision_vocabulary:
  adopt_core: Required to close Bundle 8R for research-quality evidence coverage.
  adopt_enhancement: Useful after core close or for selected workflows; must still have a contract before
    use.
  adapt_clue_only: May be collected only as a clue or market context and cannot promote material facts.
  defer_out_of_scope: Catalogued but excluded from the current non-trading research OS.
