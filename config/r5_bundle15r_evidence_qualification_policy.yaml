schema_version: r5_bundle15r_evidence_qualification_policy_v1
bundle_id: R5_BUNDLE15R_REVIEWED_EVIDENCE_QUALIFICATION
allowed_source_classes:
  - issuer_exchange_filings
  - issuer_investor_relations_records
  - peer_official_disclosures
  - industry_regulator_or_association
  - market_data_primary_or_licensed
  - government_or_regulator
  - audited_financial_statement
  - transaction_or_legal_filing
prohibited_source_classes:
  - sample_report
  - narrative_sample
  - benchmark_sample
  - generated_report
  - model_output_as_evidence
minimum_driver_confidence: medium
require_physical_source_archive: true
require_all_case_source_classes: true
require_all_research_questions_classified: true
minimum_qualified_peers: 3
hard_boundaries:
  fetch_or_review_evidence_automatically: false
  mutate_canonical_workflow_state: false
  generate_or_accept_reader: false
  sample_quality_allowed: false
  p2_allowed: false
