source_types:
  annual_report:
    reliability_rank: A
    use_case: company_fact
    default_freshness: until_next_periodic_report
  announcement:
    reliability_rank: A
    use_case: company_event
    default_freshness: event_dependent
  exchange_data:
    reliability_rank: A
    use_case: market_or_disclosure
    default_freshness: source_dependent
  regulator_statistics:
    reliability_rank: A
    use_case: macro_or_industry_fact
    default_freshness: until_next_release
  policy:
    reliability_rank: B
    use_case: policy_context
    default_freshness: until_revision_or_implementation_change
  industry_report:
    reliability_rank: B
    use_case: industry_estimate
    default_freshness: 6-12 months
  brokerage_report:
    reliability_rank: C
    use_case: analyst_view
    default_freshness: 3-6 months
  transcript:
    reliability_rank: C
    use_case: management_comment_or_qualitative_check
    default_freshness: 1-3 months
  company_website:
    reliability_rank: C
    use_case: product_or_company_description
    default_freshness: source_dependent
  news:
    reliability_rank: D
    use_case: event_tracking_only
    default_freshness: 1-4 weeks
  social_media:
    reliability_rank: D
    use_case: clue_only
    default_freshness: immediate_verification_required
  other:
    reliability_rank: D
    use_case: unknown_or_unclassified
    default_freshness: verification_required

rank_meaning:
  A: 可作为核心事实依据，仍需记录日期、路径、页码或表格定位。
  B: 可作为重要背景或行业证据，需说明口径和适用范围。
  C: 可使用但必须标注限制，不能单独支撑关键财务结论。
  D: 只能作为线索，不能单独支撑 material claim。

manifest_fields:
  - evidence_id
  - source_type
  - source_name
  - title
  - publisher
  - publish_date
  - ingested_at
  - file_hash
  - raw_file_path
  - processed_text_path
  - reliability_rank
  - status
  - license_note

guardrails:
  - Do not invent source titles, dates, page numbers, or URLs.
  - Do not treat management comments, sell-side forecasts, or media narratives as facts.
  - Keep data/raw immutable; put extracted text and tables under data/processed.
