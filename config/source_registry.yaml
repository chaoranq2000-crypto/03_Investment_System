    use_case: company_fact
    default_freshness: until_next_periodic_report
  announcement:
    reliability_rank: A
    use_case: company_event
    default_freshness: event_dependent
  exchange_data:
    reliability_rank: A
    use_case: market_or_disclosure
    default_freshness: source_dependent
  regulator_statistics:
    reliability_rank: A
    use_case: macro_or_industry_fact
    default_freshness: until_next_release
  policy:
    reliability_rank: B
    use_case: policy_context
    default_freshness: until_revision_or_implementation_change
  industry_report:
    reliability_rank: B
    use_case: industry_estimate
    default_freshness: 6-12 months
  brokerage_report:
    reliability_rank: C
    use_case: analyst_view
    default_freshness: 3-6 months
  transcript:
    reliability_rank: C
    use_case: management_comment_or_qualitative_check
    default_freshness: 1-3 months
  company_website:
    reliability_rank: C
    use_case: product_or_company_description
    default_freshness: source_dependent
  news:
    reliability_rank: D
    use_case: event_tracking_only
    default_freshness: 1-4 weeks
  social_media:
    reliability_rank: D
    use_case: clue_only
    default_freshness: immediate_verification_required
  other:
    reliability_rank: D
    use_case: unknown_or_unclassified
    default_freshness: verification_required

