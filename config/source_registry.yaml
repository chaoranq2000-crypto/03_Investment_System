rank_meaning:
  A: 可作为核心事实依据，仍需记录日期、路径、页码或表格定位。
  B: 可作为重要背景或行业证据，需说明口径和适用范围。
  C: 可使用但必须标注限制，不能单独支撑关键财务结论。
  D: 只能作为线索，不能单独支撑 material claim。

manifest_fields:
  - evidence_id
  - source_type
  - source_name
  - title
  - publisher
  - publish_date
  - ingested_at
  - file_hash
  - raw_file_path
  - processed_text_path
  - reliability_rank
  - status
  - license_note

guardrails:
  - Do not invent source titles, dates, page numbers, or URLs.
  - Do not treat management comments, sell-side forecasts, or media narratives as facts.
  - Keep data/raw immutable; put extracted text and tables under data/processed.
