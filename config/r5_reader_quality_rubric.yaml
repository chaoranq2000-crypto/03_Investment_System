schema_version: r5_reader_quality_rubric_v0.2
rubric_id: r5_bundle7_positive_reader_quality_gate
candidate_threshold: 82
research_draft_threshold: 45
critical_blockers_must_equal: 0
human_review_required: true
sample_quality_report_allowed: false
p2_allowed: false

dimensions:
  evidence_integrity: 20
  coverage_completeness: 15
  analytical_synthesis: 20
  forecast_and_valuation: 15
  narrative_and_readability: 15
  presentation_hygiene: 10
  risks_and_watch_conditions: 5

candidate_requirements:
  extremely_thin_han_chars: 900
  min_total_han_chars: 3200
  min_complete_analysis_sections: 7
  min_independent_underlying_sources: 2
  min_credible_peers: 3

required_sections:
  - executive_summary
  - company_context_and_scope
  - financial_history_and_cashflow_quality
  - business_breakdown_and_economics
  - industry_structure_and_competition
  - forecast_and_scenarios
  - valuation_and_market_expectations
  - dated_events
  - risks_counterevidence_and_watchpoints
  - research_conclusion

section_minimums:
  executive_summary:
    min_han_chars: 180
    min_unique_refs: 2
    required_signals: [judgment, economic_impact, counterevidence, watchpoint]
    required_signal_ratio: 0.75
  company_context_and_scope:
    min_han_chars: 160
    min_unique_refs: 2
    required_signals: [judgment, counterevidence]
    required_signal_ratio: 1.0
  financial_history_and_cashflow_quality:
    min_han_chars: 420
    min_unique_refs: 3
    required_signals: [trend, causal, economic_impact, counterevidence, watchpoint]
    required_signal_ratio: 0.8
  business_breakdown_and_economics:
    min_han_chars: 420
    min_unique_refs: 3
    required_signals: [judgment, trend, causal, economic_impact, counterevidence, watchpoint]
    required_signal_ratio: 0.83
  industry_structure_and_competition:
    min_han_chars: 480
    min_unique_refs: 3
    required_signals: [judgment, trend, causal, economic_impact, counterevidence, watchpoint]
    required_signal_ratio: 0.83
  forecast_and_scenarios:
    min_han_chars: 480
    min_unique_refs: 3
    required_signals: [assumption, causal, economic_impact, counterevidence, watchpoint]
    required_signal_ratio: 0.8
  valuation_and_market_expectations:
    min_han_chars: 480
    min_unique_refs: 3
    required_signals: [judgment, economic_impact, peer, reverse_valuation, counterevidence, watchpoint]
    required_signal_ratio: 0.67
  dated_events:
    min_han_chars: 300
    min_unique_refs: 2
    required_signals: [future_event, causal, verification_metric, counterevidence, watchpoint]
    required_signal_ratio: 0.8
  risks_counterevidence_and_watchpoints:
    min_han_chars: 300
    min_unique_refs: 3
    required_signals: [counterevidence, economic_impact, watchpoint]
    required_signal_ratio: 1.0
  research_conclusion:
    min_han_chars: 260
    min_unique_refs: 2
    required_signals: [judgment, assumption, counterevidence, watchpoint]
    required_signal_ratio: 0.75

forbidden_main_body_patterns:
  raw_internal_id: '(?:ev_|claim_(?:id|cn)_|metric_(?:id|cn)_|assumption_id|r5_b[0-9]_)[A-Za-z0-9_]+'
  internal_path: '(?:reports/workflow_runs|data/manifests|data/raw|data/processed|\.agents/skills)/[^\s`)>]+'
  machine_label: '\b(?:readiness|visible_gap|next_action)\b'
  raw_gap_token: '\b(?:TODO|MISSING|LOW_CONFIDENCE|UNREVIEWED|UNVERIFIED)(?:_[A-Z0-9_]+)?\b'
  direct_advice: '(?:买入|卖出|持有评级|建议仓位|加仓|减仓|目标价|保证收益)'
  fabricated_review: '(?:human_review_status:\s*(?:accepted|passed)|人工复核已通过)'
display_reference_pattern: '\[E[1-9][0-9]*\]'
