schema_version: r5_bundle17r_bf2_execution_policy_v1
require_input_lock_coverage: true
passed_statuses:
  - passed
  - complete
  - completed
  - engineering_pass
failed_statuses:
  - failed
  - rejected
  - error
manual_statuses:
  - manual_pending
  - pending
  - needs_manual_route
always_manual_routes:
  - manual
  - human_review
  - evidence_review
allowed_repo_prefixes:
  - .agents/
  - .github/workflows/
  - config/
  - data/
  - decisions/
  - docs/
  - reports/
  - schemas/
  - scripts/
  - src/
  - templates/
  - tests/
repo_candidate_extensions:
  - .csv
  - .html
  - .json
  - .md
  - .py
  - .toml
  - .txt
  - .yaml
  - .yml
archive_extensions:
  - .zip
  - .png
  - .jpg
  - .jpeg
  - .webp
  - .log
reject_path_patterns:
  - __pycache__
  - .pytest_cache
  - .ruff_cache
  - .mypy_cache
  - .DS_Store
  - node_modules
  - .env
  - credentials
  - secret
  - token
  - '*.pyc'
  - '*.pyo'
  - '*.tmp'
  - '*.temp'
  - '~*'
require_checks_for_pass: true
require_resolved_blocker_for_pass: true
require_manual_attestation: true
