  news_clues:
    claim_boundary: clue_only
    min_independent_domains: 1
    retry_policy: polite_public_http
    expected_fields: [title, publish_date, source_url]
    sources:
      - source_name: cls_market
        role: primary
        priority: 10
        independence_domain: cls
        adapter: planned_public_http_adapter
        endpoint_hint: news_search
        enabled: false
      - source_name: news
        role: fallback
        priority: 20
        independence_domain: general_news
        adapter: manual_or_url_snapshot
        endpoint_hint: news_clue
        enabled: true
      - source_name: eastmoney_push2
        role: fallback
        priority: 30
        independence_domain: eastmoney
        adapter: planned_public_http_adapter
        endpoint_hint: news_clue
        enabled: true
      - source_name: ths
