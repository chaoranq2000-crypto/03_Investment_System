name: r5-bundle11r-runtime

on:
  pull_request:
    paths:
      - 'src/research/economic_archetypes.py'
      - 'src/research/research_question_planner.py'
      - 'src/research/operating_driver_engine.py'
      - 'src/research/peer_eligibility.py'
      - 'src/research/backflow_router.py'
      - 'src/quality/semantic_research_gate.py'
      - 'src/research/r5_bundle11r_runtime.py'
      - 'scripts/run_r5_bundle11r_runtime.py'
      - 'scripts/audit_r5_bundle11r_target.py'
      - 'scripts/integrate_r5_bundle11r_workflow.py'
      - 'tests/test_r5_bundle11r_runtime_*.py'
  workflow_dispatch:

jobs:
  focused-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python -m pip install --upgrade pip pytest pyyaml
      - run: python -m pytest -q tests/test_r5_bundle11r_runtime_contracts.py tests/test_r5_bundle11r_runtime_engine.py tests/test_r5_bundle11r_runtime_semantic.py tests/test_r5_bundle11r_runtime_integration.py
      - run: python -m compileall -q src/research src/quality scripts
