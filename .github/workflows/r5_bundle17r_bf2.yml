name: R5 Bundle 17R-BF2 exact-hash backflow intake

on:
  push:
    paths:
      - 'src/research/r5_bundle17r_backflow_execution.py'
      - 'scripts/run_r5_bundle17r_backflow_execution.py'
      - 'config/r5_bundle17r_backflow_execution_policy.yaml'
      - 'schemas/r5_bundle17r_*'
      - 'templates/r5_bundle17r_*'
      - 'tests/test_r5_bundle17r_backflow_execution*.py'
      - 'tests/r5_bundle17r_bf2_test_support.py'
      - '.github/workflows/r5_bundle17r_bf2.yml'
  pull_request:
    paths:
      - 'src/research/r5_bundle17r_backflow_execution.py'
      - 'scripts/run_r5_bundle17r_backflow_execution.py'
      - 'config/r5_bundle17r_backflow_execution_policy.yaml'
      - 'schemas/r5_bundle17r_*'
      - 'templates/r5_bundle17r_*'
      - 'tests/test_r5_bundle17r_backflow_execution*.py'
      - 'tests/r5_bundle17r_bf2_test_support.py'
      - '.github/workflows/r5_bundle17r_bf2.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  focused-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install focused dependencies
        run: python -m pip install --disable-pip-version-check pytest pyyaml
      - name: Compile implementation
        run: python -m py_compile src/research/r5_bundle17r_backflow_execution.py scripts/run_r5_bundle17r_backflow_execution.py
      - name: Run Bundle 17R-BF2 focused tests
        env:
          PYTHONPATH: .
        run: >-
          pytest -q
          tests/test_r5_bundle17r_backflow_execution.py
          tests/test_r5_bundle17r_backflow_execution_cli.py
          tests/test_r5_bundle17r_backflow_execution_determinism.py
          tests/test_r5_bundle17r_backflow_execution_fail_closed.py
