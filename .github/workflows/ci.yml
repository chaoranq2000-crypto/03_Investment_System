name: CI

on:
  push:
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -l {0}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          channels: conda-forge
          activate-environment: investment-system-ci
          python-version: "3.11"
      - name: Install test dependencies
        run: conda install -y pytest pyyaml pandas pypdf
      - name: Compile Python files
        run: python -m py_compile $(git ls-files '*.py')
      - name: Validate source routes and operational adapters
        run: python scripts/run_source_route_quality_gate.py --import-check --output reports/quality/ci_source_route_quality_report.yaml
      - name: Run night-shift contract and recovery regression
        run: python -m pytest -q tests/test_r5_night_shift_*.py
      - name: Guard Bundle17R, Night02, and Night03 historical outputs
        run: python -c "import subprocess; baseline='758ab7557d9de9eea42a5aeb5df95e3d68c26f0c'; paths=['reports/p1_6/r5_bundle17r','reports/p1_6/r5_night_shift/r5_overnight_02_20260720','reports/p1_6/r5_night_shift/r5_overnight_03_20260721']; out=subprocess.check_output(['git','diff','--name-only',f'{baseline}..HEAD','--',*paths], text=True); assert not out.strip(), out"
      - name: Run pytest
        run: python -m pytest -q
