name: CI

on:
  push:
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -l {0}
    steps:
      - uses: actions/checkout@v4
      - uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          channels: conda-forge
          activate-environment: investment-system-ci
          python-version: "3.11"
      - name: Install test dependencies
        run: conda install -y pytest pyyaml pandas pypdf
      - name: Compile Python files
        run: python -m py_compile $(git ls-files '*.py')
      - name: Validate source routes and operational adapters
        run: python scripts/run_source_route_quality_gate.py --import-check --output reports/quality/ci_source_route_quality_report.yaml
      - name: Run pytest
        run: python -m pytest -q
