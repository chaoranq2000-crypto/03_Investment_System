name: R5 Bundle 17R-BF2-EX1 verified result materialization

on:
  push:
    paths:
      - 'src/research/r5_bundle17r_verified_result_materializer.py'
      - 'scripts/run_r5_bundle17r_verified_result_materializer.py'
      - 'config/r5_bundle17r_verified_result_policy.yaml'
      - 'schemas/r5_bundle17r_verified_*'
      - 'templates/r5_bundle17r_verified_*'
      - 'tests/test_r5_bundle17r_verified_result_materializer*.py'
      - '.github/workflows/r5_bundle17r_bf2_ex1.yml'
  pull_request:
    paths:
      - 'src/research/r5_bundle17r_verified_result_materializer.py'
      - 'scripts/run_r5_bundle17r_verified_result_materializer.py'
      - 'config/r5_bundle17r_verified_result_policy.yaml'
      - 'schemas/r5_bundle17r_verified_*'
      - 'templates/r5_bundle17r_verified_*'
      - 'tests/test_r5_bundle17r_verified_result_materializer*.py'
      - '.github/workflows/r5_bundle17r_bf2_ex1.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  focused-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install focused dependencies
        run: python -m pip install --disable-pip-version-check pytest pyyaml
      - name: Compile implementation
        run: >-
          python -m py_compile
          src/research/r5_bundle17r_verified_result_materializer.py
          scripts/run_r5_bundle17r_verified_result_materializer.py
      - name: Run focused tests
        env:
          PYTHONPATH: .
        run: >-
          pytest -q
          tests/test_r5_bundle17r_verified_result_materializer.py
          tests/test_r5_bundle17r_verified_result_materializer_cli.py
