schema_version: r5_evidence_plan_v0.1
artifact_type: R5_stock_evidence_snapshot_plan
metadata:
  workflow_id: wf_r5_fixture
  company_id: company_fixture
  stock_code: '000000'
  company_name: Fixture Company
  as_of_date: '2026-07-07'
  date_window:
    filings_years: [2023A, 2024A, 2025A]
    events_months: 18
implementation_boundary:
  no_live_api: true
  no_downloader_added: true
  plan_only: true
source_gap_policy:
  missing_tokens:
    - MISSING_DISCLOSURE
    - TODO_SOURCE_REQUIRED
    - TODO_MARKET_DATA
    - TODO_PEER_DATA
  preserve_missing_data: true
evidence_requests:
  official_filings:
    - request_id: r5_official_annual_3y
      evidence_need: recent_3y_annual_reports
      source_type: annual_report
      source_rank: A
      as_of_date: '2026-07-07'
      freshness_policy: latest_three_fiscal_years_or_visible_gap
      allowed_usage: [fact_support, business_exposure_after_review, financial_metrics, risk]
      required_for_pack: [company_identity_pack, evidence_snapshot_pack, financial_history_pack, business_breakdown_pack]
      status: planned
      evidence_id: null
      missing_reason: TODO_SOURCE_REQUIRED
      next_action: register annual reports or keep MISSING_DISCLOSURE
    - request_id: r5_official_latest_periodic
      evidence_need: latest_interim_or_quarterly_report
      source_type: periodic_report
      source_rank: A
      as_of_date: '2026-07-07'
      freshness_policy: latest_available_periodic_report_or_visible_gap
      allowed_usage: [fact_support, financial_metrics, risk]
      required_for_pack: [financial_history_pack, evidence_snapshot_pack]
      status: planned
      evidence_id: null
      missing_reason: TODO_SOURCE_REQUIRED
      next_action: register latest interim/quarterly report
    - request_id: r5_official_announcements_18m
      evidence_need: material_announcements_and_inquiry_replies_12_18m
      source_type: announcement
      source_rank: A
      as_of_date: '2026-07-07'
      freshness_policy: last_12_to_18_months_or_visible_gap
      allowed_usage: [fact_support, event_context_after_review, risk]
      required_for_pack: [sentiment_event_pack, risk_counterevidence_pack]
      status: planned
      evidence_id: null
      missing_reason: TODO_SOURCE_REQUIRED
      next_action: register material announcements and exchange inquiry replies
  structured_financial_metrics:
    - request_id: r5_structured_financials
      evidence_need: income_balance_cashflow_indicators
      source_type: structured_financial_data
      source_rank: B
      as_of_date: '2026-07-07'
      freshness_policy: align_to_latest_official_filing
      allowed_usage: [metric_candidate, reconciliation_context]
      required_for_pack: [financial_history_pack, forecast_model_pack]
      status: planned
      evidence_id: null
      missing_reason: TODO_SOURCE_REQUIRED
      next_action: register reviewed structured snapshots as metric candidates
  market_snapshot:
    - request_id: r5_market_snapshot
      evidence_need: current_price_market_cap_multiples
      source_type: market_data_snapshot
      source_rank: B
      as_of_date: '2026-07-07'
      freshness_policy: explicit_as_of_date_required
      allowed_usage: [valuation_context, technical_context]
      required_for_pack: [valuation_pack, technical_market_pack]
      status: planned
      evidence_id: null
      missing_reason: TODO_MARKET_DATA
      next_action: register reviewed market snapshot or downgrade valuation/technical sections
  peer_snapshot:
    - request_id: r5_peer_snapshot
      evidence_need: peer_financial_and_valuation_snapshot
      source_type: peer_snapshot
      source_rank: B
      as_of_date: '2026-07-07'
      freshness_policy: explicit_peer_set_and_as_of_date_required
      allowed_usage: [peer_context, valuation_context]
      required_for_pack: [peer_comparison_pack, valuation_pack]
      status: planned
      evidence_id: null
      missing_reason: TODO_PEER_DATA
      next_action: register peer set and peer snapshot or keep TODO_PEER_DATA
  industry_context_clues:
    - request_id: r5_industry_context
      evidence_need: industry_price_supply_demand_policy_clues
      source_type: industry_context
      source_rank: C
      as_of_date: '2026-07-07'
      freshness_policy: stale_after_180_days_unless_policy_source
      allowed_usage: [context_only, TODO_generation]
      required_for_pack: [industry_context_pack]
      status: planned
      evidence_id: null
      missing_reason: TODO_SOURCE_REQUIRED
      next_action: register context source and keep company-specific claims separate
  news_event_clues:
    - request_id: r5_news_event_clues
      evidence_need: news_event_clues_12_18m
      source_type: news_social_clue
      source_rank: D
      as_of_date: '2026-07-07'
      freshness_policy: clue_only_with_verification_required
      allowed_usage: [clue_only, TODO_generation]
      required_for_pack: [sentiment_event_pack, risk_counterevidence_pack]
      status: planned
      evidence_id: null
      missing_reason: TODO_SOURCE_REQUIRED
      next_action: verify with official disclosure before material use
  investor_relations:
    - request_id: r5_ir_records
      evidence_need: investor_relations_or_company_website_context
      source_type: investor_relations
      source_rank: C
      as_of_date: '2026-07-07'
      freshness_policy: management_comment_with_date_required
      allowed_usage: [management_comment, company_context]
      required_for_pack: [business_breakdown_pack, sentiment_event_pack]
      status: planned
      evidence_id: null
      missing_reason: TODO_SOURCE_REQUIRED
      next_action: tag as management_comment and do not promote to fact
handoff_to_stock_deep_dive:
  evidence_manifest_path: data/manifests/evidence_manifest.csv
  claim_candidates_path: data/manifests/claims_draft.csv
  metric_candidates_path: data/manifests/metrics_draft.csv
  source_gap_register_path: reports/workflow_runs/<workflow_id>/R5_source_gap_register.yaml
  evidence_counts:
    official_filings: TODO
    structured_financial_metrics: TODO
    market_snapshot: TODO
    peer_snapshot: TODO
    context_clues: TODO
  official_filing_requests: [r5_official_annual_3y, r5_official_latest_periodic, r5_official_announcements_18m]
  structured_metric_requests: [r5_structured_financials]
  market_snapshot_requests: [r5_market_snapshot]
  peer_snapshot_requests: [r5_peer_snapshot]
  context_clue_requests: [r5_industry_context, r5_news_event_clues, r5_ir_records]
  missing_inputs:
    - TODO_SOURCE_REQUIRED
    - TODO_MARKET_DATA
    - TODO_PEER_DATA
