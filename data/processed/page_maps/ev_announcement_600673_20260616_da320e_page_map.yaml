  text: " \n410 \n（二）评估假设 \n1、一般假设 \n（1）公平交易假设：假定所有待评估资产已经处在交易过程中，评估师根据待评\n估资产的交易条件等模拟市场进行估价。\
    \ \n（2）公开市场假设：公开市场假设是对资产拟进入市场的条件以及资产在这样的\n市场条件下接受何种影响的一种假定。公开市场是指充分发达与完善的市场条件，是\n\
    指一个有自愿的买方和卖方的竞争性市场，在这个市场上，买方和卖方的地位平等，\n都有获取足够市场信息的机会和时间，买卖双方的交易都是在自愿的、理智的、非强\n\
