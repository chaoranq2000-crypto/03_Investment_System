    \ \nEV/A=（股权价值+债权价值）/长期资产 \nP/B（市净率）=股权价值/账面归属于母公司所有者的净资产 \n资产基础价值比率主要反映企业资产与其企业价值之间的关系。\
    \ \n③盈利基础价值比率 \n盈利基础价值比率是在资产价值和盈利类指标之间建立的价值比率，这类价值比\n率可以进一步分为企业价值（ EV）比率和股权（ E）价值比率。该类价值比率一般包\n\
    括： \nEV/EBITDA=（股权价值+债权价值）/息税折旧摊销前利润 \nEV/EBIT=（股权价值+债权价值）/息税前利润 \nEV/NOIAT=（股权价值+债权价值）/（EBIT\
