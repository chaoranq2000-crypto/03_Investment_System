  text: " \n348 \n收入基础价值比率是在资产价值与营业收入之间建立的价值比率。这类价值比率\n可以进一步分为企业价值比率和股权价值比率。该类价值比率一般包括：\
    \ \nEV/S=（股权价值+债权价值）/销售收入 \nP/S（市销率）=股权价值/销售收入 \n收入基础价值比率主要反映企业经营收入与其企业价值之间的关系。\
