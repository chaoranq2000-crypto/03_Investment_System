  text: " \n396 \n值税进项税。其计算公式为： \n设备重置全价＝设备购置价＋运杂费＋设备基础费＋安装调试费＋前期及其他费\n用＋资金成本－可抵扣增值税进项税\
    \ \n其中： \na.设备购置价：通过市场询价确定设备的现行市场价格，具体方式如下： \n直接向经销商或制造商询价，或参考商家的价格表、正式出版的价格资料、计算\n\
    机网络上公开的价格信息等，并考虑其价格可能的下浮幅度，以及设备改造的成本费\n用，确定设备的现行市场价格； \n采用替代的方法确定设备的现行市场价格，对一些老旧或无法查到现行市场价格，\n\
    但已出现替代的设备，按照评估的替代性原则，经过技术含量和功能差别的分析比较，\n合理确定设备的现行市场价格； \n采用分类价格系数调整法：对于查不到现行市场价格，也无替代设备出现的老旧\n\
    设备和自制设备、非标设备，将设备账面原值调整为设备原始购置价的前提下，通过\n测算同期、同类设备的价格变动系数，对账面价值调整获得设备的现行市场价格。 \n\
