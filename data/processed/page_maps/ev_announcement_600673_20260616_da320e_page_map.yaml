  text: " \n481 \n数据中心的下游使用者行业分布广泛，互联网企业与云服务商作为海量数据的载\n体，对数据中心需求规模较大，需要功率密度更高、数据传输速率更快、定制化程度\n\
    更高的数据中心服务，这类企业的需求构成了数据中心需求的基本盘。此外，金融机\n构对数据中心的安全性要求较高，且随着金融业务数据的大量沉淀及数字化转型趋势\n\
    深化，其对数据中心的需求也保持较快的增长态势；数字政府建设持续提升政务决策\n科学性和服务效率，也随之拉动政府机构客户对数据中心的需求。 \n（七）本次交易标的核心竞争力及行业地位\
