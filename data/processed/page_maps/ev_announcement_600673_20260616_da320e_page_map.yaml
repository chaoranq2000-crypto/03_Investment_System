    \ \n十一、本次交易符合“并购六条”的相关规定 \n2024 年 9 月，证监会发布《关于深化上市公司并购重组市场改革的意见》（简称\n“并购六条”），明确支持上市公司围绕科技创新、产业升级布局，包括有助于补链\n\
    强链和提升关键技术水平的未盈利资产收购等。 \n目标资产秦淮数据是国内领先的中立第三方超大规模算力基础设施解决方案运营\n商，已形成覆盖环首都、长三角、珠三角大湾区及西北地区的超大规模算力基础设施\n\
    集群布局，并重点拓展内蒙古乌兰察布、广东韶关、甘肃庆阳等绿电富集区项目资源，\n成为各区域数字经济的重要推动力量。本次交易完成后，目标资产将成为公司的全资\n\
    子公司，有助于上市公司进一步推动秦淮数据的业务、人员、财务、机构等方面的整\n合与协同，进一步实现双方资源的相互赋能。 \n通过本次交易，上市公司与目标资产将在区域布局、技术研发、产品协同、业务\n\
    需求等方面形成显著协同效应，实现更多优势资源要素向新质生产力方向的聚集。上\n市公司主营业务将通过融入目标资产相关业务实现 “强链、补链、延链 ”，形成优势\n\
    互补，符合“并购六条”的精神。 \n综上，本次交易有利于提高上市公司资产质量、增强持续经营能力，不会导致财\n务状况发生重大不利变化，符合“并购六条”的相关规定。\
