  text: " \n353 \n经营规模是企业资产体量的大小，一般来说体量越大，整体市值越高，抗风险能\n力越大，市场占有率也会有所增加。衡量企业经营规模的大小主要是营业收入和资产\n\
    规模。由于本次成长能力修正采用收入复合增长率进行修正，已经考虑了营业收入因\n素的影响，不宜重复采用营业收入规模作为修正参数，故本次选择资产规模进行修正。\
    \  \n经分析目标资产和可比案例均存在较大的在建工程， 其在建工程均为各公司新建\n数据中心所支出的工程费用，能够衡量各公司新建项目规模，鉴于在建工程相对总资\n\
    产规模较小，纳入总资产规模参与修正容易弱化新增项目对公司价值的贡献，故本次\n评估确定资产规模维度修正包括在建工程规模和资产总额扣减在建工程后资产规模。 \n\
    资产规模的修正是正向的，即总资产规模越大，则向上修正；反之则向下修正。\n秦淮数据与可比公司的资产规模状况如下表： \n项目 \n目标资产 \n可比公司一\
