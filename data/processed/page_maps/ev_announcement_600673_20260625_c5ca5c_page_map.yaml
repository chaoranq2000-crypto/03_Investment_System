    三、关联交易定价情况

    本次签署的《IDC 服务合同》遵循公平、自愿、合理的交易原则，定价原则

    参照市场化标准执行，符合商业惯例。本次交易不存在利用关联方关系损害上市

    公司利益行为，也不存在向关联方输送利益的情形。

    四、关联交易合同主要内容和履约安排

    （一）合同签署主体

    甲方：东莞东阳光云智算科技有限公司

    乙方：庆阳秦阳信息科技有限公司

    （二）合同主要内容

    1、合同标的

    甲方因开展业务的需要，需将自用及服务型设备(托管设备")托管在乙方机

    房，并由乙方提供本合同约定的相关技术服务(统称“IDC 服务")。

    2、服务项目费用

    甲方采用机柜包电服务模式，按照月度计收服务费，预计 12 个月内相关服

    务项目费用合计不超过 20,000 万元人民币。

    3、违约责任

    无论本合同其他条款是否有相反约定，任何一方在本合同中承担的责任仅

    限于该方依法应当赔偿的直接经济损失，任何一方对因本合同项下违约行为而'
