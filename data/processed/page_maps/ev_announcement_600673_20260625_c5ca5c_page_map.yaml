    关于控股子公司签署 IDC 服务合同暨关联交易的公告

    本公司董事会及全体董事保证本公告内容不存在任何虚假记载、误导性陈

    述或者重大遗漏，并对其内容的真实性、准确性和完整性承担法律责任。

    重要内容提示：

    ● 广东东阳光科技控股股份有限公司（以下简称“公司”）控股子公司东莞东

    阳光云智算科技有限公司（以下简称“东莞云智算”）拟与关联方庆阳秦阳信息科

    技有限公司（以下简称“秦阳公司”）签署《IDC 服务合同》，预计 12 个月内东

    莞云智算向秦阳公司采购相关 IDC 服务项目费用合计不超过 20,000 万元人民币。

    ● 本次交易构成关联交易，不构成《上市公司重大资产重组管理办法》规定

    的重大资产重组

    ● 本次交易已经公司第十二届董事会第二十八次会议审议通过，无需提

    交股东会审议。

    ● 截至本次关联交易，过去 12 个月内上市公司与同一关联人或与不同关

    联人之间相同交易类别下标的相关的关联交易未占上市公司最近一期经审计

    净资产绝对值 5%以上。

    一、关联交易概况

    公司控股子公司东莞云智算拟与关联方秦阳公司签署《IDC 服务合同》，

    东莞云智算将自用及服务型设备（“托管设备”）托管在秦阳公司机房，并由秦

    阳公司提供合同约定相关技术服务，预计 12 个月内相关 IDC 服务项目费用合

    计不超过 20,000 万元人民币。

    秦阳公司上层股东涉及公司董事、高管和公司控股股东及其董事、监事、

    高管，根据《上海证券交易所股票上市规则》等相关规定，基于实质重于形式

    以及谨慎性的原则，认定秦阳公司为公司关联方，因此本次交易构成关联交

    易。本次交易不构成《上市公司重大资产重组管理办法》所规定的重大资产重

    组情形。'
