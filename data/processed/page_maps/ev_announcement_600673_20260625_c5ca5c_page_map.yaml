  text: '导致的对方可得利益损失、对第三方客户的赔偿、商业信誉损失以及数据丢失

    或损坏等其他损失或间接利益不承担任何责任。

    4、争议解决

    所有因本合同引起的或与本合同有关的任何争议将通过双方友好协商解

    决。如果双方不能通过友好协商解决争议，则任何一方均可向北京仲裁委员会

    提起仲裁。

    仲裁进行过程中，双方将继续履行本合同未涉争议的其它部分。

    五、对公司的影响

    本次关联交易旨在满足东莞云智算业务开展及常态化运营的需求，系公司算

    力产业布局落地、业务规模化推进的重要实质性举措，与公司整体发展战略相契

    合，符合公司及全体股东的利益。本次关联交易遵循协商一致、公平交易的原则，

    合同按正常商业条款及公平原则订立，定价方式公平、公正，公允，交易结果不

    会对公司的财务状况及经营造成重大不利影响，不存在影响公司经营独立性的问

    题。本次交易不存在损害公司及全体股东，特别是中小股东利益的情形。

    六、该关联交易应当履行的审议程序

    （一）独立董事专门会议审议情况

    2026 年 6 月 24 日，公司召开第十二届董事会独立董事第九次专门会议审

    议《关于控股子公司签署 IDC 服务合同暨关联交易的议案》，全体独立董事一

    致审议通过并同意提交董事会审议。

    （二）董事会审议情况

    2026 年 6 月 24 日，公司召开了公司第十二届董事会第二十八次会议，以

    3 票同意，0 票反对，0 票弃权审议通过了《关于控股子公司签署 IDC 服务合

    同暨关联交易的议案》，关联董事张红伟、胡来文、张光芒、王文钧回避了表

    决。

    特此公告。

