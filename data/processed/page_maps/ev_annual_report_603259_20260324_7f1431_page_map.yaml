    重要提示

    一、本公司董事会及董事、高级管理人员保证年度报告内容的真实性、准确性、完整性，不存在

    虚假记载、误导性陈述或重大遗漏，并承担个别和连带的法律责任。

    二、公司全体董事出席董事会会议。

    三、德勤华永会计师事务所（特殊普通合伙）为本公司出具了标准无保留意见的审计报告。

    四、公司负责人Ge Li（李革）、主管会计工作负责人施明及会计机构负责人（会计主管人员）

    孙瑾声明：保证年度报告中财务报告的真实、准确、完整。

    五、董事会决议通过的本报告期利润分配预案或公积金转增股本预案

    公司2025年年度利润分配方案：拟向全体股东每10股派发现金红利人民币15.7927元（含税）

    。以本报告日公司总股本测算，共计派发现金红利人民币4,712,158,162.18元（含税）。2025年度

    公司现金分红总额为人民币6,754,983,352.88元。此外，本年内公司以集中竞价方式实施股份回购

    并注销人民币2,000,004,795.52元，现金分红和回购注销金额合计人民币8,754,988,148.40元，占本

    年度归属于上市公司股东的净利润的比例为45.72%。在实施权益分派股权登记日前公司享有利润

    分配权（即扣减公司回购账户中的股份（如有））总股本发生变动的，按照每股分配金额不变的

    原则进行分配，相应调整分配总额。

    本报告期内的公司2025年回报股东特别分红方案：向股东每10股派发现金红利人民币3.5000

    元（含税），共计派发现金红利人民币1,009,797,833.10元（含税）。公司2025年回报股东特别分

    红方案已实施完毕。

    本报告期内的公司2025年中期利润分配方案：向股东每10股派发现金红利人民币3.5000元（

    含税），共计派发现金红利人民币1,033,027,357.60元（含税）。公司2025年中期利润分配方案已

    实施完毕。

