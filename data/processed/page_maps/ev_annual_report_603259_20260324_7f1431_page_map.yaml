    位、一体化的新药研发和生产服务，致力于推动新药研发进程，为患者带来突破性的治疗方案。

    本着以客户为中心的宗旨，公司通过高质量、高效率和极具成本效益的研发服务，助力客户提升

    研发效率，让更多的新药、好药早日问世，造福全球病患。

