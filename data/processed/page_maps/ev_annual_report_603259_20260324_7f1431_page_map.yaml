    11 / 249

    第三节 管理层讨论与分析

    一、报告期内公司从事的业务情况

    （一） 主要业务

    公司为全球医药及生命科学行业提供一体化、端到端的新药研发和生产服务，在亚洲、欧洲、

    北美等地均设有运营基地。公司通过独特的“CRDMO”业务模式，不断降低研发门槛，助力客

    户提升研发效率，为患者带来更多突破性的治疗方案，服务范围涵盖化学药研发和生产、生物学

    研究、临床前测试和临床研发等领域。

    公司始终恪守最高国际质量监管标准，自成立以来，凭借优异的服务纪录以及完善的知识产

    权保护体系，在全球医药研发行业赢得了公认的优秀声誉。公司所形成的服务品质在业内具备极

    高认可度和公信力。公司不断优化和发掘跨板块间的业务协同性以更好地服务全球客户，持续强

    化公司独特的一体化CRDMO 业务模式，并提供真正的一站式服务，满足客户从药物发现、开发

    到生产的服务需求。

    截至本报告期末，公司共拥有33,834 名员工。公司将继续通过招聘、培训、晋升、激励等方

    式留任优秀人才，以维持公司高水准的服务、行业领先的专业地位，持续满足客户需求。

    （二） 经营模式

    公司业务可以分为化学业务（WuXiChemistry）、测试业务（WuXiTesting）、生物学业务（WuXi

    Biology）和其他业务（Others）。服务范围覆盖从概念产生到商业化生产的整个流程，服务区域

    包括中国、美国、欧洲及全球其他区域。

    报告期内公司新增重要非主营业务的说明

    □适用 √不适用

    二、报告期内公司所处行业情况

    公司属于医药研发服务行业，主要为全球医药及生命科学行业提供新药研发和生产服务。公

    司的主营业务涵盖化学药研发和生产、生物学研究、临床前测试和临床研发等领域。公司是为数

    不多的“一体化、端到端”的研发服务平台，能够顺应药物研发价值链，从早期药物发现阶段开

    始为客户提供服务，并在客户项目不断推进的过程中，从“跟随项目发展”到“跟随药物分子发

    展”，不断扩大服务，获得持续的增长。

    公司与全球制药行业发展以及新药研发投入密切相关，在全球制药行业蓬勃发展的推动下，

    公司的主营业务有着广阔的发展空间，伴随着全球各国经济的发展、全球人口总量的增长、人口

    老龄化程度的提高、科技进步、医疗开支上升以及大众对于健康生活的需求不断增强，预计全球

    制药市场规模以及对于医药研发服务的需求仍然将持续增长。

    三、经营情况讨论与分析

    随着产能不断提升以更好满足客户需求，截至2025 年12 月末，公司持续经营业务在手订单

    人民币580.0 亿元，同比增长28.8%。报告期内，公司持续经营业务收入人民币434.2 亿元，其中

    来自美国客户收入人民币312.5 亿元，同比增长34.3%；来自欧洲客户收入人民币48.2 亿元，同

    比下降4.0%；来自中国客户收入人民币54.7 亿元，同比下降3.5%；来自其他地区客户收入人民

    币18.8 亿元，同比增长4.1%。

    具体详见本报告第三节、五、“报告期内主要经营情况”。'
