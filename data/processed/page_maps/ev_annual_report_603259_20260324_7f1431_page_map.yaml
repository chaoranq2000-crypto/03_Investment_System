    ii. 公司持续推进小分子产能建设。2025 年，常州、泰兴及金山原料药基地均以零缺陷

    成功通过FDA 现场检查。截至2025 年末，小分子原料药反应釜总体积已提升至超

    4,000kL。

    - TIDES 业务（寡核苷酸和多肽）保持高速增长。

    i. 随着2024 年新增产能逐季度爬坡，2025 年TIDES 业务收入达到113.7 亿元，同比

    增长96.0%。截至2025 年末，TIDES 在手订单同比增长20.2%。

    ii. TIDESD&M服务客户数同比提升25%，服务分子数量同比提升45%。

    iii. 2025 年9 月，提前完成泰兴多肽产能建设。公司多肽固相合成反应釜总体积已提升

    至超100,000L。

    (2) 测试业务实现收入人民币40.4 亿元，同比恢复正增长4.7%。报告期内：

    - 药物安全性评价业务收入同比增长4.6%，持续保持亚太行业领先地位。

    - 公司积极助力客户开展全球授权许可合作。新分子业务持续发力，2025 年收入占比进一

    步提升至超30%，在核酸类、偶联类、多特异性抗体类、多肽类等领域保持领先地位。

    - 公司持续推进自动化，药性评价业务自主开发一站式化合物鉴定软件，助力客户核酸类

    和多肽类代谢产物鉴定，解谱效率提升83%。

    - 苏州、上海设施连续多次顺利通过FDA、OECD、NMPA、PMDA 检查。

    (3) 生物学业务实现收入人民币26.8 亿元，同比恢复正增长5.2%。报告期内：

    - 生物学业务秉持科学驱动理念，前瞻布局药物发现热点及差异化能力；积极拓展全球业

    务，为公司CRDMO 业务模式高效引流，持续为公司带来超过20%的新客户。

    - 通过药物发现体内、外业务联动、跨区域合作和热点领域的一体化服务，高效赋能全球

    客户。

    - 体外综合筛选平台技术加速突破，体内药理学能力持续提升，驱动收入快速增长。非肿

    瘤业务保持竞争优势，为业务增长贡献重要力量。

    - 新分子业务持续贡献增长，2025 年收入占比进一步提升至超30%，核酸类、偶联抗体类、

    多肽类等领域新客户快速增长。

    预计2026年公司整体收入达到513-530亿元，持续经营业务收入同比增长18%-22%。公司将更

    加聚焦CRDMO核心战略，加速全球化能力建设和产能投放，持续提高生产经营效率。

    上述提及的2026年全年经营业绩展望以公司目前在手订单情况为基础预测，并以全球医药行

    业发展平稳、国际贸易环境和主要运营所在地国家监管环境稳定等为前提基础，并不代表公司管

    理层对2026年度全年经营业绩的盈利预测，不构成公司对投资者的实质承诺，能否实现取决于内

    外部环境变化等多种因素影响，存在较大的不确定性。'
