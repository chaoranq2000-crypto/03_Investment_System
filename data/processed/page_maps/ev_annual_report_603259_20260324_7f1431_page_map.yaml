    其他说明

    期末发行在外的股权激励计划：

    1、2020 年H 股奖励信托计划

    2020 年8月，2020 年第一次临时股东大会审议通过了《关于审议<无锡药明康德新药开发股

    份有限公司2020 年H 股奖励信托计划（草案）>的议案》，并授权董事会及授权人士全权办理H

    股奖励信托计划相关事宜。根据2020 年H 股奖励信托计划，本公司已与香港中央证券信托有限

    公司（“受托人”）签订信托契约，受托人根据本公司指示通过市场内交易方式以现行市价购买

    本公司H 股。

    2020 年12 月，公司向2,444 名激励对象首次授予5,498,666 股H 股奖励股份。各批次H 股奖

    励股份的归属期分别在达成若干年度表现条件后于紧随授出日期的第一、第二、第三及第四个周

    年届满之日起一年内归属，各批次归属比例分别为25%、25%、25%及25%。截至2024年12 月

    31 日，2020 年H 股奖励信托计划首次授予的奖励股票已全部归属。

    2021 年6 月，公司向31 名激励对象进一步授予134,654 股H 股奖励股份。各批次H 股奖励

    股份的归属期分别为激励对象开始受雇于本集团相关成员公司之日后一周年、两周年、三周年及

    四周年届满之日起一年内，各批次归属比例分别为0%、25%、25%及50%。截至2025 年6月30

    日，2020 年H 股奖励信托计划第一次预留授予的奖励股票已全部归属。

    2021 年11 月，公司向26 名激励对象进一步授予93,677 股H 股奖励股份。各批次H 股奖励

    股份的归属日期分别为2022 年8 月1 日、2023 年7 月31 日、2024 年7 月31 日及2025 年7 月

    31 日，各批次归属比例分别为25%、25%、25%及25%。截至2025年12 月31 日，2020 年H 股

    奖励信托计划第二次预留授予的奖励股票已全部归属。

    2022 年1 月，公司向46 名激励对象进一步授予160,894 股H 股奖励股份。各批次H 股奖励

    股份的归属日期分别紧随激励对象开始受雇于本集团相关成员公司之日的一周年、两周年、三周

    年及四周年届满之日后本公司股份的首个交易日。各批次归属比例分别为0%、25%、25%及50%。

    截至2025 年12 月31 日，2020 年H 股奖励信托计划第三次预留授予的奖励股票已全部归属。

