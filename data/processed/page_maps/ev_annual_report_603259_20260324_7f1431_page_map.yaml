    入公司，理解和体会公司文化价值观精髓，将公司核心价值观与员工行为相结合，更好地激情工

    作、快乐生活、成长发展在药明康德。

    NIO 项目是为新加入药明康德的实习生伙伴量身定制，通过线上学习的方式，将企业文化、

