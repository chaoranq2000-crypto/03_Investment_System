    三、关键审计事项 - 续

    (一)收入确认

    1、事项描述

    集团主要通过其化学业务、测试业务和生物学业务向客户提供新药研发和生产服务。

    2025 年度集团营业收入为人民币45,456,165,774.18 元。相关信息披露详见财务报表附注(七)、

    61。

    由于营业收入是集团关键业绩指标之一，可能存在管理层通过不恰当的收入确认从而调

    节财务成果以达到特定目标或预期的固有风险。因此我们将收入确认识别为关键审计事项。

    2、审计应对

    我们在审计过程中对该事项执行了以下程序：

     了解集团收入确认相关的流程以及关键内部控制，评价相关内部控制的设计，确定

    其是否得到执行，并测试相关内部控制的运行有效性；

     了解集团收入确认的会计政策，选取样本检查合同，查看其主要交易条款，评价集

    团关于收入确认政策是否符合合同的约定以及企业会计准则的规定；

     以全年收入交易为总体，选取样本：

    1) 针对按照时点确认的收入，查阅相关的合同，并检查收入确认对应的签收单、

    物流记录、报告交付记录等支持性文件，以评价收入确认的真实性及准确性；

    2) 针对按照一段时间确认的收入，查阅相关的服务合同，并检查工时记录、阶段

    性服务成果交付记录等项目进度相关支持性文件，以评价收入确认的真实性及准确

    性；

     以资产负债表日前后一段时间内记录的收入交易为总体，选取样本，查阅相关的合

    同，并检查收入确认对应的签收单、物流记录、报告交付记录等支持性文件的日期，

    以评价收入是否确认于恰当会计期间；

     针对年末未实现收入的在手订单，选取样本，查阅对应的合同和其他记录，查看是

    否存在应确认但未确认的收入；以及

     对收入执行分析程序，包括月度分析、与上年同期比较分析，复核收入的合理性。'
