    （二）人员独立性

    在人员独立方面，公司设有独立的人力资源管理部门，建立了完整的劳动用工、薪酬管理及

    绩效考核体系。公司的董事及高级管理人员均通过合法程序选举或聘任，不存在实际控制人越权

    干预人事任免的情形。公司的董事及高级管理人员均不在实际控制人控制的其他企业中担任除董

    事、监事以外的其他职务，也不在上述企业中领薪。公司的财务人员不在实际控制人控制的其他

    企业中兼职或领薪。公司劳动人事管理与关联方完全分离，薪酬体系独立运作。

    （三）财务独立性

    在财务独立方面，公司严格按照《企业会计准则》及相关规定建立了一套独立、完整、规范

    的财务会计核算体系和财务管理制度，并建立了相应的内部控制制度，配备专职财务人员，独立

    作出财务决策，独立开设银行账户并办理税务登记，财务决策机制完整，不存在与实际控制人及

    其控制的企业共用财务管理系统或共享银行账户的情形。

    （四）机构独立性

    在机构独立方面，公司已建立了独立的、适应自身发展需要的组织结构，制订了较为完善的

    岗位职责和管理制度，不存在与实际控制人控制的其他企业合署办公，混合经营的状况。

    （五）业务独立性

    在业务独立方面，公司拥有独立完整的采购、生产、销售系统，公司的经营业务完全独立于

    实际控制人控制的其他企业，不存在同业竞争关系或业务上的依赖关系，具有独立运营日常业务

    的能力。

    （六）公司实际控制人同时担任上市公司董事长和总经理的合理性及保持上市公司独立性措

    施

    GeLi（李革）博士不仅是公司的实际控制人，更是公司的创始人。其同时担任公司董事长及

    总裁、首席执行官系基于公司当前发展阶段及战略统筹需要而设立。该安排有利于提高重大战略

    决策的执行效率，确保公司长期发展战略与日常经营管理的高度协同。公司自上市以来，未发生

    实际控制人违规担保、资金占用等情形。同时，为严格遵循《上市公司治理准则》之规定，切实

    保障上市公司独立性，公司已采取并持续执行以下具体措施：

    1、职权清晰界定：公司制订了《公司章程》《董事会议事规则》及《总裁办公会议事规则》，

    明确划分董事会的战略决策权与总裁的经营管理权；

    2、强化独立董事监督：公司董事会中独立董事占比达到1/3 以上，并在审计委员会、提名委

    员会、薪酬与考核委员会中占多数并担任召集人。独立董事认真履行职责，充分发挥参与决策、

    监督制衡、专业咨询作用，维护公司整体利益；

    3、完善内控与回避制度：公司建立了严格的内部控制体系，若涉及实际控制人与公司的关联

    交易时，严格执行关联董事及关联股东回避表决制度，确保交易公允，防止利益输送。

    控股股东、实际控制人及其控制的其他单位从事与公司相同或者相近业务的情况，以及同业竞争

