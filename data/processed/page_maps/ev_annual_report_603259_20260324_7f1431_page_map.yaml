    第四节 公司治理、环境和社会

    一、公司治理相关情况说明

    √适用 □不适用

    公司作为沪港两地上市公司，报告期内始终恪守《公司法》《证券法》《上市公司治理准则》

    《上海证券交易所股票上市规则》《香港联合交易所有限公司证券上市规则》等境内外法律法规

    及监管规定，持续完善公司治理体系。报告期内，公司通过健全治理架构、优化内控管理机制、

    强化合规运作水平，切实保障全体股东尤其是中小投资者的合法权益。公司治理架构严格遵循分

    权制衡原则：股东会作为公司最高权力机构，依法行使重大事项决策权；董事会作为决策中枢，

    下设战略委员会（统筹中长期发展规划）、审计委员会（主导财务监督与风险管控、董事高管履

    职监督）、薪酬与考核委员会（完善激励约束体系）、提名委员会（优化人才选聘机制）四个专

    门委员会，通过分级授权机制科学决策重大经营事项；高级管理人员团队严格执行董事会决议，

    全面负责日常经营管理。

    报告期内，公司召开5 次股东会（含A 股及H 股类别股东会议各1 次）、10 次董事会、13

    次董事会专门委员会会议，审议议案通过率100%。各治理主体严格按照法定程序运作，会议召

    集、议事、表决程序符合《公司章程》及监管要求，信息披露工作保持真实、准确、完整且及时。

    全体董事及高级管理人员忠实勤勉履职，切实履行法定职责与承诺事项，有效维护公司治理安全

    性与经营连续性。

    报告期内，为进一步促进公司规范运作，落实中国证监会关于上市公司内部监督机构调整的

    相关要求，根据相关配套规定，同时结合公司实际情况，公司系统修订《公司章程》《股东会议

    事规则》《董事会议事规则》《独立董事工作制度》以及董事会专门委员会议事规则等多项制度，

    重点包括取消监事会，监事会职责由审计委员会行使，并由审计委员会监督公司内部审计机构具

    体落实；增加股东保护性条款、完善董高履职要求、强化信息披露和豁免责任等；优化董事会各

    专门委员会的职能、总裁办公会的职能等，提高执行层面的决策效率。修订后的制度在一如既往

    符合最新监管要求的同时，充分考量公司不同阶段发展和管理所需，在合法合规的前提下，不断

    提升公司决策的质量和效率，为公司稳健经营提供更深层次的保障，为投资者利益保驾护航。

    公司治理与法律、行政法规和中国证监会关于上市公司治理的规定是否存在重大差异；如有重大

    差异，应当说明原因

    □适用 √不适用

    二、公司控股股东、实际控制人在保证公司资产、人员、财务、机构、业务等方面独立性的具体

    措施，以及影响公司独立性而采取的解决方案、工作进度及后续工作计划

    √适用 □不适用

    公司严格按照《公司法》《公司章程》《上市公司治理准则》《上海证券交易所股票上市规

    则》等法律法规及规范性文件的要求规范运作，建立权责明确、制衡有效的法人治理结构，与实

    际控制人及其关联方在资产、人员、财务、机构、业务等方面保持独立，具有完整的业务体系和

    独立面向市场自主经营的能力，具体情况如下：

    （一）资产独立性

    在资产独立方面，公司建立了《对外担保及提供财务资助管理制度》，对实际控制人及其关

    联方等关联人提供担保事项明确了内部审议程序、回避表决机制、反担保要求。公司不存在以资

    产和权益为实际控制人及其关联方提供担保的情形。同时，公司建立了《防范控股股东及关联方

    占用公司资金制度》，通过资金集中管理，定期核查等机制，有效防范资金占用风险，杜绝控股

    股东及关联方资金占用行为的发生。公司不存在资产、资金被实际控制人及其控制的其他企业违

    规占用的情形。'
