    六、公司关于公司未来发展的讨论与分析

    (一)行业格局和趋势

    √适用 □不适用

    大型制药企业外包比例提升、中小型制药公司需求不断增长，全球医药研发生产服务行业有

    望保持较快增长。一方面，创新药物研发具有高投入、长周期、高风险等行业特点。在研发回报

    率较低与专利悬崖的双重压力下，大型制药企业有望更多地通过外部研发服务机构推进研发项目，

    提高研发效率并降低研发成本。另一方面，包括中小型医药及生命科学公司和个人创业者在内的

    小型制药公司，已经成为医药创新的重要驱动力。这些中小型制药公司没有足够时间或资本自行

    建设其研发项目所需的实验室和生产设施，却需要在短时间内获得满足研发项目所需的多项不同

    服务，因而会寻求研发和生产的外包服务，尤其是“一体化、端到端”的研发服务，满足其由概念

    验证到产品上市的研发服务需求。根据2025 年9 月最新的Frost&Sullivan 报告预测，全球医药

    行业研发投入将由2024年的2,776 亿美元增长至2029 年的3,731 亿美元，复合年增长率约6.1%。

    全球医药研发服务行业，尤其是具有全球新药研发生产服务能力的平台型公司，有望受益于

    全球新药研发投入的持续增长和外包率的不断提升。根据Frost&Sullivan 报告预测，全球医药研

    发投入外包比例将由2024 年的51.9%提升至2029 年的60.0%。同时报告预测，全球医药研发外

    包服务的市场（不包括大分子和CGTCDMO）规模将由2024 年的1,365 亿美元增长到2029 年的

    2,395 亿美元，复合年增长率约11.9%。

