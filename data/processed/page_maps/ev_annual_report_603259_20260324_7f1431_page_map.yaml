    (三) 境内外会计准则差异的说明：

    √适用 □不适用

    系持有的联营企业股权比例被动稀释产生的长期股权投资账面价值变动在不同准则下的处理

    差异。2023 年度，因联营企业WuXiXDCCaymanInc.完成公开发行股份，导致本集团对其持有

    的股权比例被动稀释；2025 年度，因联营企业WuXiXDCCaymanInc.增发股份，导致本集团对

    其持有的股权比例再次被动稀释。在中国会计准则下，投资方对于被投资单位除净损益、其他综

    合收益和利润分配以外的所有者权益的其他变动，应当调整长期股权投资的账面价值并计入资本

    公积。而在国际财务报告准则下，上述被动稀释产生的对联营企业长期股权投资的影响应当计入

    当期损益。2024 年和2025 年，本集团出售该联营企业部分股权，对该联营企业所持有股权比例

    下降，在中国会计准则下相关被动稀释影响按处置比例从资本公积转至投资收益。

