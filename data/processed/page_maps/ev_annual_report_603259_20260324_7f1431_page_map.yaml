    医生和病人将参与研发创新的各个环节。未来公司将：（1）始终坚持公司独特的一体化CRDMO

    业务模式，高效极致服务公司的客户并帮助全球病患，推动公司紧跟科技创新，产生行业洞见，

    及时捕捉新分子机遇，持续驱动公司长期发展；（2）持续聚焦CRDMO 核心业务，不断提高生

    产经营效率；（3）加速推进全球产能和能力建设，并持续激励保留人才和公司共同长期发展。

