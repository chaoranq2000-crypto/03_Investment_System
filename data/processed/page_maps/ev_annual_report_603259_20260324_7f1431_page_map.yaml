    1.1.2 利率风险

    本集团面临的因利率变动而引起的金融工具现金流量变动风险主要与浮动利率银行借款有关。

    本集团根据当时的市场环境来决定固定利率及浮动利率合同的相对比例。

    于2025 年12 月31 日，浮动利率借款的金额为人民币2,000.00 万元（2024 年12 月31 日：

    299,332.08 万元）。

    于2025 年12 月31日，倘若所有其他因素维持不变，利率上调/下调50 个基点，财务费用净

    额会相应增加/减少人民币7.50 万元（2024 年12 月31 日：1,221.02 万元）（考虑所得税影响）。

    本期末，本集团存续的固定利率和浮动利率借款的实际利率范围如下：

