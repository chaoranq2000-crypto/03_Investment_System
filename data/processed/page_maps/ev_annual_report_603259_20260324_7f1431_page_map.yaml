    合收益和利润分配以外的所有者权益的其他变动，应当调整长期股权投资的账面价值并计入资本

    公积。而在国际财务报告准则下，上述被动稀释产生的对联营企业长期股权投资的影响应当计入

    当期损益。2024 年和2025 年，本集团出售该联营企业部分股权，对该联营企业所持有股权比例

    下降，在中国会计准则下相关被动稀释影响按处置比例从资本公积转至投资收益。

