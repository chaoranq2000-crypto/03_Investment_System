    全面受益于全球新药研发外包服务市场的快速发展。公司“一体化、端到端”的新药研发服务平台，

    无论是在服务的技术深度还是覆盖广度方面都能满足客户提出的多元化需求。公司顺应新药研发

    项目从早期开始向后期不断发展的科学规律，在客户项目不断推进的过程中，从“跟随项目发展”

