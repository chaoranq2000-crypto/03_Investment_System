    第一节 释义

    一、 释义

    在本报告书中，除非文义另有所指，下列词语具有如下含义：

    常用词语释义

    公司、本公司、药明康德 指 无锡药明康德新药开发股份有限公司

    本集团 指 药明康德及其子公司

    公司章程 指 《无锡药明康德新药开发股份有限公司章程》

    报告期、本报告期 指 2025 年1-12 月

    报告期末、本报告期末 指 截至2025 年12 月31 日

    药明香港 指 WuXiAppTec(HongKong)Limited

    国家药监局 指 国家药品监督管理局。如文义所需，包括其前身中华人民共

    和国国家食品药品监督管理总局

    中国证监会 指 中国证券监督管理委员会

    上交所 指 上海证券交易所

    联交所/香港联交所 指 香港联合交易所有限公司

    元、万元、亿元 指 人民币元、万元、亿元

    股份 指 本公司股本中每股面值人民币1.00 元的普通股，包括A 股及

    H 股

    临床研究 指

    是医学研究和卫生研究的一部分，其目的在于建立关于人类

    疾病机理、疾病防治和促进健康的基础理论。临床研究涉及

    对医患交互和诊断性临床资料、数据或患者群体资料的研究

    医药研发服务 指 本报告中指CRO 及CDMO 两块业务

    小分子药物 指

    小分子药物主要是指化学合成药物，通常分子量小于1000 道

    尔顿，具有使用广泛、理论成熟等优势，目前市场上成熟的

    药物绝大多数均为小分子药物

    创新药 指

    按照国家食药监局化学药品注册分类标准进行分类的一类化

    学药品，以及按照国家食药监局生物制品注册分类的一类生

    物制品

    原料药 指

    ActivePharmaceuticalIngredients，又称活性药物成份，由化学

    合成、植物提取或者生物技术所制备，但病人无法直接服用

    的物质，一般再经过添加辅料、加工，制成可直接使用的制

    剂

    临床试验 指

    任何在人体（病人或健康志愿者）进行药物的系统性研究，

    以证实或揭示试验药物的作用、不良反应及/或试验药物的吸

    收、分布、代谢和排泄，目的是确定试验药物的疗效与安全

    性

    CDMO 指

    ContractDevelopmentandManufacturingOrganization，合同研

    发与生产业务，即在提供产品生产时所需要的工艺开发、配

    方开发、临床试验用药、化学或生物合成的原料药生产、中

    间体制造、制剂生产（如粉剂、针剂）以及包装等业务的基

    础上，增加相关产品的定制化研发业务

    CRDMO 指 合同研究、开发与生产

    CRO 指

    ContractResearchOrganization，合同研发服务，是通过合同形

    式为制药企业和研发机构在药物研发过程中提供专业化服务

    的一种学术性或商业性的科学机构

    IND 指 研究性新药（InvestigationalNewDrug）'
