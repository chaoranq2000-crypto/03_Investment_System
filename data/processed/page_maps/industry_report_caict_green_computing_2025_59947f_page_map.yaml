    "text": "绿色算力发展研究报告（2025 年）\n5\n二、绿色算力总体进展\n（一）宏观政策环境\n全球绿色算力能耗及碳排约束政策呈现严苛化趋势。 美国通过\n《国家人工智能研发战略计划》，其能源部主导的“算力能效实验室”\n项目推动服务器动态功耗管理技术降低设备能耗。美国俄勒冈州的\n“清洁算力阶梯税制”对未能按期减排企业实施超额累进税率，促使亚\n马逊、微软等企业提前三年完成 100%绿电转型。欧盟碳边境调节机\n制(CBAM)首次将云计算服务纳入管控范围，要求非欧盟企业进口算\n力服务时缴纳碳差价，仅 2024 年就推动全球 15 家云服务商建立全生\n命周期碳足迹追踪系统。德国《能源效率法案》提出针对 PUE 和余\n热回收的指标体系，推动法兰克福数据中心集群通过相变冷却技术与\n区域供热管网连接，使年均 PUE 降至 1.18 的同时实现余热利用率提\n升。日本在半导体领域实施性能功耗比强制标准，要求 2025 年后生\n产的 AI 加速芯片每瓦特算力提升不低于 15%，推动东芝、索尼等企\n业开发出基于 3D 堆叠技术的超低功耗处理器。\n我国政策引导算力从集约建设转向“算效—算电—算用”全面协\n同的高质量模式。2024 年至 2025 年，我国在算力领域密集出台多项\n国家政策，聚焦绿色低碳、算电协同、算力调度与普惠应用等方面。\n2024 年 7 月，四部委联合发布《数据中心绿色低碳发展专项行动计\n划》提出严格新上项目能效水效要求，推进存量项目节能降碳改造，\n加强资源节约集约利用，推广应用节能技术装备，进一步提升可再生\n能源利用率，引导智算中心规范化建设。2025 年 2 月，国家能源局"
