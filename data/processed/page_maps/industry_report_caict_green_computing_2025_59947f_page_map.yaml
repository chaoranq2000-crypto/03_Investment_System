    "text": "绿色算力发展研究报告（2025 年）\n3\n载体、算能协同和算用协同等四个维度进一步丰富和完善绿色算力内\n涵和发展框架，如图 1 所示。\n图 1 绿色算力发展框架\n算力设备绿色化——高效：算力设备是包括芯片、服务器、存储\n等产生算力的核心 IT 设备，提升高效性是其绿色化的关键本质。算\n力设备绿色化，主要指产生算力的核心 IT 设备运行的高效化，通过\n芯片制造封装工艺技术进步以及处理器架构创新提升单芯片性能（芯\n片层），运用先进存储、存算一体、无损网络融合等技术促进计算存\n储网络协同（系统层）等方式提升底层 IT 软硬件高效性从而降低能\n耗，是绿色算力在算力设备微观层面的核心体现。 IT 设备能耗、算\n效（CE）、存效（SE）是算力设备高效性的主要核心指征。\n算力载体绿色化——节能：算力载体是承载算力设备的数据中心\n载体设施，持续节能降碳是其绿色化的主要目标。算力载体绿色化，\n主要指数据中心载体设施通过运用绿色建筑、供配电、制冷、智能运\n维等新技术持续降低数据中心载体设施的能耗及碳排放，推进数据中"
  },
  {
    "page_no": 11,
    "text": "绿色算力发展研究报告（2025 年）\n4\n心载体设施资源及能源的循环利用，包括水资源回收利用、余热回收\n利用等，是当前行业推进绿色算力发展的主要手段。电能使用效率\n（PUE）、水资源利用率（WUE）等是算力载体节能化的主要核心指\n征。\n算能协同绿色化——清洁：算能协同聚焦算力侧与能源侧的协同\n布局，提升清洁能源使用率是其绿色化的核心所在。算能协同绿色化，\n主要指通过算力布局选址靠近能源侧，提升可再生能源利用率、推进\n绿电和绿证交易、采用储能和微电网等先进技术以及建设综合能源与\n算力协同调度系统等方式推动算力和能源协调发展，旨在实现算力基\n础设施更高效、可靠和可持续的能源利用，是支撑算力绿色化发展的\n关键所在。可再生能源使用率、数据中心绿电绿证采购应用量等是算\n力协同绿色化的主要核心指征。\n算用协同绿色化——普惠：算用协同聚焦算力侧与应用侧的协同\n赋能，推进算力行业赋能的低成本集约发展是其绿色化的根本要义。\n算用协同绿色化，主要指通过算力融入支撑应用侧提升效率，以及供\n需对接减少资源浪费，进一步提质增效和降低成本，促进应用侧节能\n减排，其本质是推进算力基础设施的可持续发展，也是绿色算力发展\n的重要延伸。\n算力设备和算力载体是绿色算力创新发展的基础底座，反应了绿\n色算力的发展水平；算能协同是绿色算力创新发展的坚实支撑，反应\n了绿色算力的建设条件；算用协同是绿色算力创新发展的牵引拉动，\n反应绿色算力的需求和应用状况，四大方面相互促进、协同发展。"
  },
