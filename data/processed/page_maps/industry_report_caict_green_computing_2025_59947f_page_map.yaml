    "text": "绿色算力发展研究报告（2025 年）\n60\n结算额给予奖励，促进算力使用和算力券发放，有效降低企业成本，\n提升园区应用服务活力。集宁大数据产业园积极推动算力资源广泛应\n用，汇聚了大量下游企业。区域内金山云、阿里云、百度智行等企业，\n依托园区算力开展云计算、大数据分析和智能服务。\n20、甘肃枢纽庆阳集群—庆阳西峰数据信息产业聚集区\n庆阳集群庆阳西峰数据信息产业聚集区稳步推进算力产业发展。\n近三年来，庆阳西峰数据信息产业聚集区吸引了多家泛互联网头部及\n智算企业入驻，形成多样化的算力产业集群。泛互联网企业如燧弘科\n技、憨猴科技、智谱华章、百川智能等大模型和智算企业陆续落地。\n运营商方面，中国移动、中国联通和中国电信均已布局关键网络节点。\n其他企业如中国能建、秦淮数据、浙江众合等积极参与园区建设，推\n动数据中心与智能计算的融合发展，提升区域算力整体水平。\n庆阳西峰区的智算中心建设快速推进，形成多样化的高性能计算\n和大模型训练平台。燧弘科技、憨猴科技等专注于 AI 大模型和智能\n算法的企业，借助园区优质算力资源，开展语音识别、图像识别和自\n动驾驶等应用的研发与落地。金山云和阿里云在庆阳分别建设了智能\n计算中心，提供云计算和 AI 服务。区域内还形成了庆阳工业云数字\n中心和庆阳农业产业云两大应用服务平台，推动工业互联网和农业数\n字化转型，促进智算成果与地方产业深度融合。\n21、宁夏枢纽中卫集群—中卫工业园西部云基地\n宁夏枢纽中卫集群的中卫工业园西部云基地算力产业发展迅速，\n基础设施完善，政策支持力度大，推动区域数字经济快速发展。中卫"
