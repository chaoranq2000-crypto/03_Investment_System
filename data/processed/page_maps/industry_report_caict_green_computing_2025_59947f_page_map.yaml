    "text": "绿色算力发展研究报告（2025 年）\n2\n要求成员国数据中心 2030 年前实现碳中和，美国能源部则投入 180\n亿美元推动液冷技术商业化应用。 在产业层面，Google 采用深度地\n热系统为亚利桑那州数据中心供能，使 PUE 值降至 1.08；微软在挪\n威建设的海底数据中心利用海水自然冷却，年节电达 2.4 亿千瓦时。\n在社会效益层面，挪威研究表明数据中心余热供暖可降低区域供热成\n本 17%12，英国 DeepMind 通过 AI 优化数据中心制冷系统，相当于减\n少 25 万辆汽车的年排放量。更深层意义在于，绿色算力构建了算力\n产业发展逻辑的新范式——算力供给必须遵循“环境正外部性”原则，\n即单位比特的传输不仅要考虑经济成本，更要计量环境及能耗代价。\n彭博新能源财经数据显示， 2024 年全球 62%的云服务采购合同已包\n含碳排放条款，苹果、Meta 等企业要求供应商必须使用经认证的绿\n色算力。13欧盟碳边境调节机制（CBAM）覆盖数字服务领域碳足迹\n核算，绿色算力将成为跨国企业供应链准入的重要资质，倒逼企业采\n用可再生能源，微软、Google 已实现 100%清洁能源供电，针对绿色\n算力的碳审计、ESG 咨询也将成为新增长点。\n（三）绿色算力成为系统性创新工程\n实践表明，绿色算力已从单一能效优化升级为涵盖技术革新、政\n策协同、产业模式创新的系统工程。绿色算力指围绕着算力生产、供\n给、运营、应用的全过程，通过统筹推进算力设备、算力载体、算能\n协同和算用协同等多个环节的绿色化体系建设，实现高质量算力绿色\n低碳发展。在此基础上，本报告结合新形势新要求从算力设备、算力\n12 数据来源：奥斯陆市和芬兰首席能源电力公司 Fortum Oyj 签署数据中心回收热量意向书\n13 数据来源：彭博新能源财经"
