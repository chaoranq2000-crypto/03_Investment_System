    "text": "前 言\n党的二十届三中全会提出，“加快经济社会发展全面绿色转型”，\n绿色发展是高质量发展的底色，新质生产力本身就是绿色生产力。\n作为新质生产力的关键载体，算力正深刻重构产业生态，但其发展\n建设过程中的能耗和碳排放问题日益凸显，发展绿色算力已经成为\n业界普遍共识。本报告围绕算力生产、供给、运营、应用的全过程，\n全面总结全球及我国算力设备、算力载体、算能协同和算用协同等\n多个环节推动算力绿色低碳发展的最新动态和先进实践。\n在算力设备绿色化方面，我国算力设备整体效能不断提升。通\n过协同推进高性能芯片的工艺架构一体化创新，重点攻关先进存储、\n存算一体、CXL 等前沿技术，规模化部署高密度集成 IT 设备及液\n冷系统，系统性提升我国算力设备的算效与存效水平。截至 2024 年\n底，我国算力总规模达到 280EFLOPS，算力总规模近 5 年平均增速\n近 30%，存力总规模约约 1580EB（艾字节），其中先进存储容量占\n比超过 28%。1\n在算力载体绿色化方面，我国算力基础设施绿色化发展特征显\n著，我国数据中心单机架耗电量及 PUE 持续降低。截至 2024 年底，\n我国在用数据中心机架总规模超过 900 万标准机架，液冷、算电热\n碳一体化、预制模块化、智能化运维等技术广泛应用推动数据中心\n设计、建设、运维全生命周期，带动平均电能利用效率（PUE）降\n至 1.46，超 140 个算力中心绿色低碳等级达到 4A 级2以上。\n1 数据来源：工业和信息化部\n2 数据来源：《数字中国发展报告（2024）》"
