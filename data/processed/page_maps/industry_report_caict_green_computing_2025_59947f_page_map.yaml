    "text": "绿色算力发展研究报告（2025 年）\n58\n17、贵州枢纽贵安集群—贵安新区贵安电子信息产业园\n贵安集群基础设施优势明显，贵安新区贵安电子信息产业园算力\n产业发展势头强劲。该区域基础设施优越，年平均气温 14℃，自然\n冷源丰富，电力充足，清洁能源占比 52%，网络高速低延迟，满足数\n据中心对大规模数据传输和云计算服务的需求。\n目前，贵安新区贵依托州市政府发放的《省大数据局关于印发贵\n州算力券管理办法（试行）的通知》的优惠“算力券”，吸引了运营商\n中国电信、中国联通、中国移动，泛互联网头部企业华为、腾讯、苹\n果、网易，以及美的、富士康、气象局、贵州农信、国家电投、南方\n能源上海旺链和九木集团等知名企业进行在此大规模布局，并建立了\n中国人民银行贵安数据中心、兴业银行数据中心、交通银行数据中心\n等数据中心。\n18、内蒙古枢纽和林格尔集群—和林格尔新区\n内蒙古和林格尔新区算力产业快速发展，依托自然冷却优势和稳\n定网络，形成数据中心、绿色算力、人工智能发展格局。该地区年平\n均气温 6.2℃，网络带宽充裕，电力供应中 86%为可再生能源，高于\n绿色算力需求。截至 2025 年 6 月底，内蒙古枢纽和林格尔数据中心\n集群数据中心项目 46 个，数据中心机架总计 52.2 万标准机架，上架\n率超 70%，平均 PUE 为 1.185。总算力规模约 10.1 万 P，其中智算占\n比超 95%。在存力方面，和林格尔集群片区总存力规模达 33952PB,\n其中先进存储规模为 5019PB，占比达 44.3%。"
