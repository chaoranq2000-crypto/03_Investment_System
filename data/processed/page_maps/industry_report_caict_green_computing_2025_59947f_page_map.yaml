    "text": "绿色算力发展研究报告（2025 年）\n21\n随着应用领域和使用场景愈发多样化，存储半导体走上 3D 堆叠\n的道路。运行 AI 模型涉及存储数据读写，随着生成式 AI 向多模态融\n合加速演进，对存储设备性能速度、容量、能效优化提出更高的要求。\n一方面，NAND 闪存厂商增加存储密度、降低功耗的趋势近期变得愈\n加明确。垂直方向堆叠可增加单位面积存储容量并优化功耗表现。目\n前，NAND 堆叠层数也已达 200 层以上。在水平层面， NAND 闪存\n厂商则通过增加每个存储单元存储的数据量来提升存储密度。从 SLC、\nMLC、TLC 到 QLC 技术，每个存储单元能存储的数据更多。从原厂\n动态来看，SK 海力士和美光率先进入 200+层时代，其中 NAND 闪\n存业界最高层数为 SK 海力士的 238 层，其次是美光的 232 层。相比\n自身的前一代产品，SK 海力士 238 层 NAND 闪存的数据读取功耗降\n低了 21%，美光 232 层 NAND 闪存的数据存储功耗降低了 28%。另\n一方面，HBM 也是由多个 DRAM 堆叠而成。HBM 通过硅通孔等先\n进封装技术垂直堆叠多颗 DRAM 芯片，并与 GPU 在中介层上紧密集\n成，有效解决了处理器与内存间速度不匹配的“内存墙”问题，显著降\n低能耗。相较于传统存储方案，HBM 突破性地提升了带宽与容量，\n并提供远超 GDDRx 的能效优势，特别契合 AI 市场对处理海量数据\n与复杂任务的刚性需求。这一关键特性使其成为 NVIDIA、AMD 等\n领军芯片厂商高端产品（如 GB200、H200、MI250 系列）的核心标\n配存储技术，并持续迭代以优化性能功耗比。例如，NVIDIA 发布的\n新一代 H200 Tensor Core GPU 搭载了 HBM3e 技术，每秒可以提供"
