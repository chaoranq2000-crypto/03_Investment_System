    "text": "绿色算力发展研究报告（2025 年）\n19\n来源：中国信息通信研究院根据公开信息整理\n（三）服务器：AI 算力激增倒逼服务器深挖减碳潜能\n液冷服务器技术为数据中心节能减排提供有力支持。传统风冷为\n散热需要高转速风扇和大功率空调，能耗高，而液冷服务器运用液体\n充当冷却媒介，依靠液体的高比热容与出色的换热性能，能有效传导\n并散发服务器工作时产生的热量，进而成功解决了传统风冷服务器所\n存在的散热效果不佳等一系列问题。液冷服务器市场表现出了强劲的\n增长势头，如联想的海神温水全水冷技术，散热效率高达 98%，可大\n幅降低数据中心的 PUE 值，最佳情况下 PUE 值达到 1.1，相比传统\n风冷可降低数据中心能耗 42%。宁畅在业内首发支持了第四代 Intel\n至强可扩展处理器的浸没式液冷服务器 B7000，在保障高性能的同时，\n有效降低了散热功耗，助力数据中心整体 PUE 降至 1.05，年耗散挥\n发率小于 3%。中兴通讯新一代 G5 系列服务器已全面兼容冷板式液\n冷散热方案，服务器液冷占比超过 80%，整机功耗降低达 80W，同\n时噪声降低了 15dB，PUE 值可低至 1.1。\n服务器电源呈现高效率、高功率密度发展趋势。高效率服务器电\n源意味着在将电能从电网（交流电）转换为服务器内部组件所需的直\n流电过程中，能量损耗较小，使得产生的废热大大降低。高功率密度\n的服务器电源可以在相同体积或更小体积内提供更高的功率输出，内\n部的发热量在高效率的基础上得到了有效控制。台达电子通过应 用\nTI 的氮化镓 (GaN) 技术，实现了数据中心在功率密度上的突破。相\n比使用传统架构的服务器电源供应器 (PSU)，台达研发的服务器电源"
