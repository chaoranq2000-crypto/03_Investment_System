    "text": "绿色算力发展研究报告（2025 年）\n41\n（一）算用协同绿色化发展总体情况\n算用协同通过“内生优化+外延赋能”双轮驱动实现节能减排。算\n用协同绿色化主要体现为两大效应，一是通过算力券、算力调度平台\n等方式加强供需对接，提高算力利用率从而降低算力产业自身碳排放\n的“直接效应”。加强算力供需对接能够帮助算力企业及时获取来自供\n应商和用户的信息和需求，减少供需之间的不确定性，避免因供需错\n配导致的资源浪费，从而提升绿色减排效率。二是通过算力赋能千行\n百业推动其他产业减少碳排放的“间接效应”。随着算力加速向政务、\n工业、交通、医疗等各行业各领域渗透，助力实现\"上云用数赋智\"的\n产业升级目标，当前中央企业上云覆盖率超过 86%31，绿色算力不断\n渗透至企业生产制造、运营管理和服务创新等核心环节，有效推动传\n统产业能耗结构优化，实现节能减排与数字化转型的双重效益，形成\n“算力供给—效率提升—碳排下降”的正向循环，促进绿色减排效率的\n协同发展。\n（二）供需对接：提高算力互通利用效率\n算力券促进算力资源优化配置和高效利用。当前全国 22 个省\n级行政区已推出地方算力券政策。省级层面以山西省、山东省、内蒙\n古自治区、黑龙江省、河南省、湖北省、陕西省、宁夏回族自治区、\n青海省、贵州省等算力资源禀赋较好的西部地区为主；市级层面以北\n京市、天津市、廊坊市、上海市、杭州市、芜湖市、武汉市、广州市、\n深圳市、厦门市、成都市、昆明市等聚焦通过科技创新拉动产业发展\n31 数据来源：国务院国有资产监督管理委员会"
