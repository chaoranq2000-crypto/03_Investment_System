    "text": "绿色算力发展研究报告（2025 年）\n59\n过去三年，依托良好配套条件，和林格尔新区吸引了大量头部企\n业在数据中心及智算领域落地，形成了较为完整的产业集群。区域内\n已建设成中国移动（呼和浩特）数据中心、中国移动呼和浩特智算中\n心、中国电信云计算内蒙古信息园、中国气象局气象超算中心、九州\n智算中心、内蒙古云著智算产业园、并行科技内蒙古新型算力基地等\n算力基础设施项目，服务百度阿里、腾讯、搜狗、网易、中行、农行、\n建行、交行、内蒙古等金融、政企客户。\n和林格尔新区的算力产业充分融合本地特色制造业资源，特别是\n在装备制造、新能源、智能工业领域表现突出。依托内蒙古丰富的资\n源与传统产业基础，园区发展了以工业互联网平台为核心的数字化转\n型服务，助力制造业智能化升级，提升产业竞争力。以东方国信 BIOP\n工业互联网平台为代表的多家企业，结合本地制造业需求，推动大数\n据与智能计算技术在生产流程优化、设备管理和产品研发中的深度应\n用，形成了具有区域特色的绿色智能算力产业链。\n19、内蒙古枢纽和林格尔集群—集宁大数据产业园\n集宁大数据产业园政策支持力度大，积极保障数据中心用能、用\n地、用电等基础设施建设。乌兰察布市对落地集宁大数据产业园的面\n向全国提供算力服务的数据中心企业，支持申报国家、自治区能耗单\n列指标，优先保障项目建设用地。此外，蒙西电网电力价格较低，政\n府对于数据中心用电提供补贴，区域电价优势明显。\n内蒙古自治区出台了《内蒙古自治区促进绿色算力产业发展若干\n政策措施》，鼓励企业建设绿色算力基础设施，支持算力资源平台按"
