    2026 年 3 月 22 日，公司控股股东、实际控制人李金阳女士及其一致行动人浙江瀚丰

    创业投资合伙企业（有限合伙）与紫金黄金（集团）有限公司（以下简称“紫金黄金”）

    签署了《关于赤峰吉隆黄金矿业股份有限公司的股份转让协议》，李金阳女士及其一致行

    动人拟将所持合计 241,925,746 股无限售流通股全部转让予紫金黄金；2026 年 3 月 22 日，

    经公司第九届董事会第六次会议批准，公司与紫金黄金签署了《战略投资协议》，公司拟

    向紫金黄金发行 310,902,731 股 H 股普通股。以上交易完成后，紫金黄金将成为公司控股

    股东。

    详见公司于上海证券交易所网站和指定信息披露媒体发布的相关公告。'
