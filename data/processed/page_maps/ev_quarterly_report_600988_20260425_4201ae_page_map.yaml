  text: '赤峰吉隆黄金矿业股份有限公司2026 年第一季度报告

    7 / 13

    老挝塞班金铜矿

    （美元/盎司）

    1,785.10 2,108.77 1,526.18 1,532.39 16.97 37.61

    加纳瓦萨金矿

    （美元/盎司）

    2,270.64 2,509.33 1,628.53 1,734.21 39.43 44.70

    注：1. 2026 年第一季度，子公司华泰矿业技改过程中产生的副产矿石，在计算国内金矿单位成本时未计

    入。

    2. 2026 年第一季度，矿产金单位成本同比上升较多，主要原因：一是税费提高。金价上涨带动主营

    业务收入增加，导致资源税同比相应增长；加纳可持续发展税税率自 2025 年 4 月由 1%升至 3%，叠加

    税基扩大，导致可持续发展税同比增加；二是部分矿山技改、大规模检修等影响黄金产量。如吉隆矿业

    提升机单绳改多绳及五龙矿业多条盲竖井改造均导致出矿受限，老挝塞班金铜矿选厂一年一次的例行大

    规模检修加之其中一台高温氧化釜进行计划内停机检修，导致矿石处理量下降。本期产金量同比下降，

    固定成本分摊增加，导致单位成本上升。矿山技改和设备检修均属于年度计划内工作，公司积极组织勘

    探、采选、技改及设备检修等各项工作，目前老挝塞班金铜矿选厂检修已经完成，各项技改工程按计划

    推进。

    四、其他提醒事项

